<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Historial de Lotes — SGC Agrofacil</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    
    /* ── TEMA DARK (default) ── */
    :root{--bg:#0c1414;--surface:#111d1d;--surface2:#162020;--border:#1e3030;--accent:#00c896;--accent2:#00a07a;--warn:#f59e0b;--danger:#ef4444;--blue:#3b82f6;--text:#e2ede9;--muted:#7a9e96;--topbar-bg:rgba(17,29,29,.95);}
    /* ── TEMA LIGHT ── */
    :root.light{--bg:#f0f5f2;--surface:#ffffff;--surface2:#f7faf8;--border:#cdddd6;--accent:#00906e;--accent2:#006e54;--warn:#d97706;--danger:#dc2626;--blue:#2563eb;--text:#1a2e28;--muted:#4a7068;--topbar-bg:rgba(240,245,242,.96);}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
    /* TOPBAR */
    .topbar{background:var(--topbar-bg);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 1.25rem;position:sticky;top:0;z-index:100;}
    .topbar-left{display:flex;align-items:center;gap:.6rem;}
    .logo{font-family:'IBM Plex Mono',monospace;font-size:.78rem;font-weight:600;color:var(--accent);letter-spacing:.06em;}
    .topbar-title{font-size:.75rem;color:var(--muted);}
    .topbar-right{display:flex;align-items:center;gap:.4rem;}
    .btn-t{display:flex;align-items:center;gap:.3rem;padding:.28rem .65rem;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);font-size:.72rem;cursor:pointer;transition:all .15s;font-family:'IBM Plex Sans',sans-serif;text-decoration:none;}
    .btn-t:hover{border-color:var(--accent);color:var(--accent);}
    .btn-t.danger{border-color:rgba(239,68,68,.3);color:var(--danger);}
    .btn-t.danger:hover{background:rgba(239,68,68,.08);}
    /* MAIN */
    main{max-width:1200px;margin:0 auto;padding:1.25rem 1rem 4rem;}
    /* BREADCRUMB */
    .breadcrumb{display:flex;align-items:center;gap:.4rem;font-family:'IBM Plex Mono',monospace;font-size:.68rem;color:var(--muted);margin-bottom:1.25rem;}
    .bc-sep{color:var(--border);}
    .bc-link{color:var(--accent);cursor:pointer;text-decoration:none;}
    .bc-link:hover{text-decoration:underline;}
    /* TABS */
    .vista-tabs{display:flex;gap:.4rem;margin-bottom:1.25rem;}
    .vista-tab{padding:.4rem .9rem;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);font-size:.73rem;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;transition:all .15s;}
    .vista-tab.active{border-color:var(--accent);color:var(--accent);background:rgba(0,200,150,.08);}
    /* KPI */
    .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:.65rem;margin-bottom:1.25rem;}
    .kpi{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.75rem .9rem;}
    .kpi .kl{font-size:.6rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:.3rem;}
    .kpi .kv{font-family:'IBM Plex Mono',monospace;font-size:1.4rem;font-weight:600;line-height:1;}
    .kpi .ks{font-size:.6rem;color:var(--muted);margin-top:.25rem;}
    .kpi.k-tot .kv{color:var(--text);}
    .kpi.k-apr .kv{color:#22c55e;}
    .kpi.k-par .kv{color:var(--warn);}
    .kpi.k-ret .kv{color:var(--danger);}
    /* VISTA CLIENTES */
    .clientes-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem;}
    .clientes-header h2{font-family:'IBM Plex Mono',monospace;font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);}
    .input-buscar{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:.35rem .7rem;color:var(--text);font-size:.75rem;font-family:'IBM Plex Sans',sans-serif;width:200px;transition:border-color .15s;}
    .input-buscar:focus{outline:none;border-color:var(--accent);}
    .clientes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:.85rem;}
    .cliente-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.1rem 1rem;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;}
    .cliente-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--blue);transform:scaleX(0);transform-origin:left;transition:transform .2s;}
    .cliente-card:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.2);}
    .cliente-card:hover::after{transform:scaleX(1);}
    .cli-icon{width:36px;height:36px;border-radius:8px;background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.25);display:flex;align-items:center;justify-content:center;font-size:1rem;margin-bottom:.75rem;}
    .cli-name{font-size:.9rem;font-weight:600;color:var(--text);margin-bottom:.2rem;}
    .cli-meta{font-size:.68rem;color:var(--muted);margin-bottom:.75rem;line-height:1.4;}
    .cli-stats{display:flex;gap:.5rem;font-family:'IBM Plex Mono',monospace;font-size:.65rem;flex-wrap:wrap;}
    .cli-stat{padding:.15rem .4rem;border-radius:3px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);}
    .cli-stat.ok{color:#22c55e;border-color:rgba(34,197,94,.25);}
    .cli-stat.ret{color:var(--danger);border-color:rgba(239,68,68,.25);}
    .sin-cliente-card{border-style:dashed;}
    /* FILTROS */
    .filtros-panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.9rem 1rem;margin-bottom:1rem;}
    .filtros-title{font-family:'IBM Plex Mono',monospace;font-size:.65rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:.6rem;}
    .filtros-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.5rem;align-items:end;}
    .fg label{display:block;font-size:.6rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:.25rem;}
    .fg input,.fg select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:.38rem .55rem;color:var(--text);font-size:.75rem;font-family:'IBM Plex Sans',sans-serif;}
    .fg input:focus,.fg select:focus{outline:none;border-color:var(--accent);}
    .fg input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(.5);}
    .btn-apl{padding:.38rem .85rem;background:var(--accent);color:#0c1414;border:none;border-radius:5px;font-size:.73rem;font-weight:600;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;align-self:end;}
    .btn-apl:hover{background:var(--accent2);}
    .btn-clr{padding:.38rem .6rem;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:5px;font-size:.73rem;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;align-self:end;}
    .btn-clr:hover{color:var(--text);border-color:var(--muted);}
    /* TABLA */
    .tabla-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
    .tabla-hdr{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:.4rem;}
    .tabla-hdr-title{font-family:'IBM Plex Mono',monospace;font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
    #lotes-count{font-family:'IBM Plex Mono',monospace;font-size:.78rem;color:var(--accent);font-weight:600;}
    .btn-xlsx{padding:.28rem .65rem;background:transparent;border:1px solid #22863a;color:#22c55e;border-radius:5px;font-size:.7rem;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;}
    .btn-xlsx:hover{background:rgba(34,197,94,.08);}
    .tbl-scroll{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;}
    thead th{padding:.5rem .7rem;text-align:left;font-size:.62rem;font-family:'IBM Plex Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);background:var(--surface2);white-space:nowrap;}
    tbody tr{border-bottom:1px solid rgba(30,48,48,.5);transition:background .1s;cursor:pointer;}
    tbody tr:hover{background:var(--surface2);}
    tbody tr:last-child{border-bottom:none;}
    tbody td{padding:.55rem .7rem;font-size:.77rem;vertical-align:middle;white-space:nowrap;}
    td.lote-num{font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--accent);}
    td.fecha-c{font-family:'IBM Plex Mono',monospace;font-size:.7rem;color:var(--muted);}
    .badge{display:inline-block;padding:.18rem .45rem;border-radius:4px;font-size:.62rem;font-weight:600;font-family:'IBM Plex Mono',monospace;letter-spacing:.04em;text-transform:uppercase;}
    .b-APR{background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.25);}
    .b-PAR{background:rgba(245,158,11,.12);color:var(--warn);border:1px solid rgba(245,158,11,.25);}
    .b-RET{background:rgba(239,68,68,.12);color:var(--danger);border:1px solid rgba(239,68,68,.25);}
    td.nc-link a{font-size:.67rem;color:var(--muted);text-decoration:none;border:1px solid var(--border);border-radius:3px;padding:.12rem .35rem;font-family:'IBM Plex Mono',monospace;transition:all .15s;}
    td.nc-link a:hover{color:var(--warn);border-color:var(--warn);}
    .btn-pdf-row{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:3px;padding:.18rem .4rem;font-size:.65rem;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;transition:all .15s;}
    .btn-pdf-row:hover{border-color:#e2632a;color:#e2632a;}
    .empty-state{padding:2.5rem 1rem;text-align:center;color:var(--muted);}
    .empty-state .ei{font-size:2rem;opacity:.35;margin-bottom:.5rem;}
    .loader-row td{padding:2rem!important;text-align:center;color:var(--muted);font-size:.75rem;}
    .spinner{display:inline-block;width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-right:.3rem;vertical-align:middle;}
    @keyframes spin{to{transform:rotate(360deg);}}
    /* PAGINACION */
    .paginacion{display:flex;align-items:center;justify-content:center;gap:.35rem;padding:.75rem;border-top:1px solid var(--border);}
    .pag-btn{padding:.25rem .55rem;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:4px;font-size:.68rem;cursor:pointer;font-family:'IBM Plex Mono',monospace;transition:all .15s;}
    .pag-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
    .pag-btn:disabled{opacity:.3;cursor:default;}
    .pag-btn.act{border-color:var(--accent);color:var(--accent);background:rgba(0,200,150,.08);}
    .pag-info{font-size:.67rem;color:var(--muted);font-family:'IBM Plex Mono',monospace;}
    /* MODAL */
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;align-items:center;justify-content:center;padding:1rem;}
    .overlay.open{display:flex;}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding:1.4rem;}
    .modal-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.1rem;}
    .m-lote{font-family:'IBM Plex Mono',monospace;font-size:1.05rem;font-weight:600;color:var(--accent);}
    .modal-close{background:transparent;border:none;color:var(--muted);font-size:1rem;cursor:pointer;}
    .modal-close:hover{color:var(--text);}
    .m-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem .7rem;margin-bottom:1rem;}
    .mf label{font-size:.6rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);display:block;margin-bottom:.18rem;}
    .mf span{font-size:.8rem;font-family:'IBM Plex Mono',monospace;}
    .m-sec{font-family:'IBM Plex Mono',monospace;font-size:.65rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid var(--border);}
    .pal-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.4rem;margin-bottom:1rem;}
    .pal-card{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:.5rem .4rem;text-align:center;}
    .pal-id{font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--muted);margin-bottom:.2rem;}
    .pal-res{font-size:.72rem;font-weight:600;font-family:'IBM Plex Mono',monospace;}
    .pal-res.OK{color:#22c55e;}.pal-res.NOK{color:var(--danger);}.pal-res.REPRO{color:var(--warn);}
    .m-actions{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:1rem;padding-top:.85rem;border-top:1px solid var(--border);}
    .m-btn{flex:1;min-width:110px;padding:.45rem .7rem;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.72rem;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;transition:all .15s;text-align:center;}
    .m-btn:hover{border-color:var(--accent);color:var(--accent);}
    .m-btn.pri{background:var(--accent);border-color:var(--accent);color:#0c1414;font-weight:600;}
    .m-btn.pri:hover{background:var(--accent2);}
    @media(max-width:640px){.kpi-row{grid-template-columns:repeat(2,1fr);}.clientes-grid{grid-template-columns:repeat(2,1fr);}.filtros-grid{grid-template-columns:1fr 1fr;}.m-grid{grid-template-columns:1fr;}.pal-grid{grid-template-columns:repeat(2,1fr);}.topbar-title{display:none;}}
  </style>
</head>

<main>
  <div class="breadcrumb" id="breadcrumb">
    <a class="bc-link" href="home.html">🏠 Inicio</a>
    <span class="bc-sep">›</span>
    <span id="bc-current" style="color:var(--text)">Historial</span>
  </div>
  <div class="kpi-row">
    <div class="kpi k-tot"><div class="kl">Total lotes</div><div class="kv" id="kpi-total">—</div><div class="ks">en período</div></div>
    <div class="kpi k-apr"><div class="kl">Aprobados</div><div class="kv" id="kpi-apr">—</div><div class="ks" id="kpi-apr-p">—</div></div>
    <div class="kpi k-par"><div class="kl">Ap. Parcial</div><div class="kv" id="kpi-par">—</div><div class="ks" id="kpi-par-p">—</div></div>
    <div class="kpi k-ret"><div class="kl">Retenidos</div><div class="kv" id="kpi-ret">—</div><div class="ks" id="kpi-ret-p">—</div></div>
  </div>
  <div class="vista-tabs">
    <button class="vista-tab active" id="tab-cli" onclick="cambiarVista('clientes')">📁 Por Cliente</button>
    <button class="vista-tab" id="tab-tbl" onclick="cambiarVista('tabla')">📋 Todos los lotes</button>
  </div>
  <!-- VISTA CLIENTES -->
  <div id="vista-clientes">
    <div class="clientes-header">
      <h2>Carpetas de clientes</h2>
      <input type="text" class="input-buscar" id="buscar-cli" placeholder="🔍 buscar cliente..." oninput="filtrarClientes()"/>
    </div>
    <div class="clientes-grid" id="clientes-grid">
      <div style="grid-column:1/-1;text-align:center;padding:2rem;color:var(--muted);font-size:.78rem;"><span class="spinner"></span> Cargando...</div>
    </div>
  </div>
  <!-- VISTA TABLA -->
  <div id="vista-tabla" style="display:none;">
    <div class="filtros-panel">
      <div class="filtros-title">🔍 Filtros</div>
      <div class="filtros-grid">
        <div class="fg"><label>Fecha desde</label><input type="date" id="f-desde"/></div>
        <div class="fg"><label>Fecha hasta</label><input type="date" id="f-hasta"/></div>
        <div class="fg"><label>Producto</label><input type="text" id="f-prod" placeholder="ej. 2,4D"/></div>
        <div class="fg"><label>Checker</label><input type="text" id="f-checker" placeholder="nombre"/></div>
        <div class="fg"><label>Dictamen</label><select id="f-dict"><option value="">Todos</option><option>APROBADO</option><option>APROBADO PARCIAL</option><option>RETENIDO</option></select></div>
        <div class="fg"><label>N° Lote</label><input type="text" id="f-nlote" placeholder="parcial"/></div>
        <button class="btn-apl" onclick="aplicarFiltros()">Aplicar</button>
        <button class="btn-clr" onclick="limpiarFiltros()">✕ Limpiar</button>
      </div>
    </div>
    <div class="tabla-wrap">
      <div class="tabla-hdr">
        <div><div class="tabla-hdr-title" id="tabla-ctx">Todos los lotes</div><div id="lotes-count" style="margin-top:.2rem;">—</div></div>
        <button class="btn-xlsx" onclick="exportarXLSX()">↓ Excel</button>
      </div>
      <div class="tbl-scroll">
        <table>
          <thead><tr><th>#</th><th>Fecha</th><th>N° Lote</th><th>Cliente</th><th>Producto</th><th>Turno</th><th>Checker</th><th>Dictamen</th><th>OK</th><th>NOK/REPRO</th><th>NCs</th><th>PDF</th></tr></thead>
          <tbody id="tbody-lotes"><tr class="loader-row"><td colspan="12"><span class="spinner"></span> Cargando...</td></tr></tbody>
        </table>
      </div>
      <div class="paginacion" id="paginacion"></div>
    </div>
  </div>
</main>
<!-- MODAL -->
<div class="overlay" id="modal-overlay" onclick="cerrarModalClick(event)">
  <div class="modal">
    <div class="modal-hdr">
      <div><div class="m-lote" id="m-lote">—</div><div style="font-size:.68rem;color:var(--muted);margin-top:.2rem;" id="m-sub">—</div></div>
      <button class="modal-close" onclick="cerrarModal()">✕</button>
    </div>
    <div class="m-grid" id="m-campos"></div>
    <div class="m-sec">Pallets</div>
    <div class="pal-grid" id="m-pallets"></div>
    <div class="m-sec">NCs vinculadas</div>
    <div id="m-nc-list" style="font-size:.75rem;color:var(--muted);min-height:30px;margin-bottom:1rem;">—</div>
    <div class="m-actions">
      <button class="m-btn" onclick="irANCs()">⚠ Ver NCs</button>
      <button class="m-btn pri" onclick="exportarPDFLote()">↓ PDF del lote</button>
    </div>
  </div>
</div>

<script type="module">
  // ── Importar desde firebase-init.js (sin reinicializar) ──────
  import { auth, db, authGuard, cerrarSesion } from './firebase-init.js';
  import { collection, query, orderBy, getDocs, where, limit }
    from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

  document.getElementById('btn-salir').addEventListener('click', cerrarSesion);

  // Auth guard
  await authGuard();

  // ── Estado ───────────────────────────────────────────────────
  let todosLotes=[], lotesFiltrados=[], clienteActivo=null, loteActual=null, pagina=1;
  const POR_PAG=20;

  // ── Cargar lotes ─────────────────────────────────────────────
  try {
    const q=query(collection(db,'lotes'),orderBy('fechaCreacion','desc'),limit(500));
    todosLotes=(await getDocs(q)).docs.map(d=>({id:d.id,...d.data()}));
  } catch {
    try{todosLotes=JSON.parse(localStorage.getItem('reg01_lotes_v3')||'[]');}catch{todosLotes=[];}
  }
  lotesFiltrados=[...todosLotes];
  actualizarKPIs(todosLotes);
  renderClientes();

  // Leer hash de cliente en URL
  const hash=window.location.hash;
  if(hash.startsWith('#cliente=')){
    seleccionarCliente(decodeURIComponent(hash.replace('#cliente=','')));
  }

  // ── Helpers ──────────────────────────────────────────────────
  function nd(l){const d=(l.dictamen||'').toUpperCase();if(d.includes('PARCIAL'))return'PARCIAL';if(d.includes('RETENIDO'))return'RETENIDO';if(d.includes('APROBADO'))return'APROBADO';return'OTRO';}
  function fmtF(raw){if(!raw)return'—';try{const d=raw.toDate?raw.toDate():new Date(raw);return d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'2-digit'});}catch{return'—';}}
  function getBadge(d){const s=(d||'').toUpperCase();if(s.includes('PARCIAL'))return'b-PAR';if(s.includes('RETENIDO'))return'b-RET';if(s.includes('APROBADO'))return'b-APR';return'';}

  function actualizarKPIs(l){
    const t=l.length,apr=l.filter(x=>nd(x)==='APROBADO').length,par=l.filter(x=>nd(x)==='PARCIAL').length,ret=l.filter(x=>nd(x)==='RETENIDO').length,p=n=>t?Math.round(n/t*100)+'%':'—';
    document.getElementById('kpi-total').textContent=t||'0';
    document.getElementById('kpi-apr').textContent=apr;document.getElementById('kpi-apr-p').textContent=p(apr);
    document.getElementById('kpi-par').textContent=par;document.getElementById('kpi-par-p').textContent=p(par);
    document.getElementById('kpi-ret').textContent=ret;document.getElementById('kpi-ret-p').textContent=p(ret);
  }

  // ── Vista tabs ───────────────────────────────────────────────
  window.cambiarVista=v=>{
    document.getElementById('vista-clientes').style.display=v==='clientes'?'':'none';
    document.getElementById('vista-tabla').style.display=v==='tabla'?'':'none';
    document.getElementById('tab-cli').classList.toggle('active',v==='clientes');
    document.getElementById('tab-tbl').classList.toggle('active',v==='tabla');
    if(v==='tabla')renderTabla();
  };

  // ── Vista Clientes ────────────────────────────────────────────
  function renderClientes(busqueda=''){
    const mapa={};
    todosLotes.forEach(l=>{const cli=(l.cliente||'').trim()||'—Sin cliente—';if(!mapa[cli])mapa[cli]=[];mapa[cli].push(l);});
    const nombres=Object.keys(mapa).sort((a,b)=>{if(a==='—Sin cliente—')return 1;if(b==='—Sin cliente—')return -1;return a.localeCompare(b,'es');});
    const fil=busqueda?nombres.filter(n=>n.toLowerCase().includes(busqueda.toLowerCase())):nombres;
    const grid=document.getElementById('clientes-grid');
    if(!fil.length){grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:2rem;color:var(--muted);font-size:.78rem;">Sin clientes registrados.</div>`;return;}
    const ICONOS=['🏭','🌾','🧪','🏗','🚜','🌿','📦','🏬','🏪','🔬'];
    grid.innerHTML=fil.map((nombre,i)=>{
      const lotes=mapa[nombre],total=lotes.length;
      const apr=lotes.filter(l=>nd(l)==='APROBADO').length,ret=lotes.filter(l=>nd(l)==='RETENIDO').length;
      const last=fmtF(lotes[0]?.fechaCreacion);
      const icon=nombre==='—Sin cliente—'?'📁':ICONOS[i%ICONOS.length];
      const esSin=nombre==='—Sin cliente—';
      const prods=[...new Set(lotes.map(l=>l.producto).filter(Boolean))].slice(0,2).join(', ')||'—';
      const displayName=esSin?'Sin asignar':nombre;
      const safeNombre=nombre.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      return`<div class="cliente-card ${esSin?'sin-cliente-card':''}" onclick="seleccionarCliente('${safeNombre}')">
        <div class="cli-icon">${icon}</div>
        <div class="cli-name">${displayName}</div>
        <div class="cli-meta">${prods}<br>${total} lote${total!==1?'s':''} · último ${last}</div>
        <div class="cli-stats">
          <span class="cli-stat">${total} total</span>
          <span class="cli-stat ok">${apr} ✓</span>
          ${ret?`<span class="cli-stat ret">${ret} ✕</span>`:''}
        </div>
      </div>`;
    }).join('');
  }

  window.filtrarClientes=()=>renderClientes(document.getElementById('buscar-cli').value);

  window.seleccionarCliente=nombre=>{
    clienteActivo=nombre;
    const esSin=nombre==='—Sin cliente—';
    lotesFiltrados=todosLotes.filter(l=>esSin?!(l.cliente||'').trim():(l.cliente||'').trim()===nombre);
    actualizarKPIs(lotesFiltrados);
    const displayName=esSin?'Sin asignar':nombre;
    document.getElementById('bc-current').innerHTML=
      `<span class="bc-link" onclick="volverAClientes()" style="color:var(--accent)">Historial</span>
       <span style="color:var(--border)"> › </span>
       <span style="color:var(--text)">${displayName}</span>`;
    document.getElementById('tabla-ctx').textContent=`Cliente: ${displayName}`;
    ['f-desde','f-hasta','f-prod','f-checker','f-nlote'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('f-dict').value='';
    pagina=1;cambiarVista('tabla');
    window.history.pushState({},'',`#cliente=${encodeURIComponent(nombre)}`);
  };

  window.volverAClientes=()=>{
    clienteActivo=null;lotesFiltrados=[...todosLotes];actualizarKPIs(todosLotes);
    document.getElementById('bc-current').textContent='Historial';
    document.getElementById('bc-current').style.color='var(--text)';
    document.getElementById('tabla-ctx').textContent='Todos los lotes';
    window.history.pushState({},'',window.location.pathname);
    cambiarVista('clientes');
  };

  // ── Vista Tabla ───────────────────────────────────────────────
  function renderTabla(){
    const ini=(pagina-1)*POR_PAG,pag=lotesFiltrados.slice(ini,ini+POR_PAG);
    const cnt=document.getElementById('lotes-count');
    cnt.textContent=lotesFiltrados.length?`${lotesFiltrados.length} lote${lotesFiltrados.length!==1?'s':''}`:'0 lotes';
    const tbody=document.getElementById('tbody-lotes');
    if(!lotesFiltrados.length){
      tbody.innerHTML=`<tr><td colspan="12"><div class="empty-state"><div class="ei">📭</div><p>Sin lotes con los filtros aplicados.</p></div></td></tr>`;
      document.getElementById('paginacion').innerHTML='';return;
    }
    tbody.innerHTML=pag.map((l,i)=>{
      const num=ini+i+1,ok=(l.pallets||[]).filter(p=>p.resultado==='OK').length,nokr=(l.pallets||[]).filter(p=>['NOK','REPRO'].includes(p.resultado)).length,bc=getBadge(l.dictamen);
      return`<tr onclick="abrirModal('${l.id}')">
        <td style="color:var(--muted);font-size:.67rem;">${num}</td>
        <td class="fecha-c">${fmtF(l.fechaCreacion)}</td>
        <td class="lote-num">${l.nLote||'—'}</td>
        <td style="font-size:.73rem;">${l.cliente||'—'}</td>
        <td>${l.producto||'—'}</td>
        <td style="font-size:.7rem;color:var(--muted);">${l.turno||'—'}</td>
        <td>${l.checker||'—'}</td>
        <td><span class="badge ${bc}">${l.dictamen||'—'}</span></td>
        <td style="text-align:center;">${ok||'—'}</td>
        <td style="text-align:center;color:${nokr?'var(--warn)':'var(--muted)'};">${nokr||'—'}</td>
        <td class="nc-link"><a href="registro_nc.html#lote=${encodeURIComponent(l.nLote||'')}" onclick="event.stopPropagation()">NCs</a></td>
        <td><button class="btn-pdf-row" onclick="event.stopPropagation();pdfId('${l.id}')">PDF</button></td>
      </tr>`;
    }).join('');
    renderPag();
  }

  function renderPag(){
    const total=Math.ceil(lotesFiltrados.length/POR_PAG),p=document.getElementById('paginacion');
    if(total<=1){p.innerHTML='';return;}
    let h=`<button class="pag-btn" ${pagina===1?'disabled':''} onclick="irPag(${pagina-1})">‹</button>`;
    for(let i=1;i<=total;i++){
      if(i===1||i===total||(i>=pagina-2&&i<=pagina+2))h+=`<button class="pag-btn ${i===pagina?'act':''}" onclick="irPag(${i})">${i}</button>`;
      else if(i===pagina-3||i===pagina+3)h+=`<span class="pag-info">…</span>`;
    }
    h+=`<button class="pag-btn" ${pagina===total?'disabled':''} onclick="irPag(${pagina+1})">›</button><span class="pag-info">${pagina}/${total}</span>`;
    p.innerHTML=h;
  }
  window.irPag=n=>{pagina=n;renderTabla();window.scrollTo(0,0);};

  // ── Filtros ───────────────────────────────────────────────────
  function baseFiltro(){
    if(!clienteActivo)return[...todosLotes];
    const esSin=clienteActivo==='—Sin cliente—';
    return todosLotes.filter(l=>esSin?!(l.cliente||'').trim():(l.cliente||'').trim()===clienteActivo);
  }

  window.aplicarFiltros=()=>{
    const desde=document.getElementById('f-desde').value,hasta=document.getElementById('f-hasta').value;
    const prod=document.getElementById('f-prod').value.toLowerCase().trim();
    const checker=document.getElementById('f-checker').value.toLowerCase().trim();
    const dict=document.getElementById('f-dict').value,nlote=document.getElementById('f-nlote').value.toLowerCase().trim();
    lotesFiltrados=baseFiltro().filter(l=>{
      let ok=true;
      if(desde||hasta){try{const f=l.fechaCreacion?.toDate?l.fechaCreacion.toDate():new Date(l.fechaCreacion);if(desde&&f<new Date(desde))ok=false;if(hasta&&f>new Date(hasta+'T23:59:59'))ok=false;}catch{ok=false;}}
      if(prod&&!(l.producto||'').toLowerCase().includes(prod))ok=false;
      if(checker&&!(l.checker||'').toLowerCase().includes(checker))ok=false;
      if(dict&&!(l.dictamen||'').toUpperCase().includes(dict.toUpperCase()))ok=false;
      if(nlote&&!(l.nLote||'').toLowerCase().includes(nlote))ok=false;
      return ok;
    });
    pagina=1;actualizarKPIs(lotesFiltrados);renderTabla();
  };

  window.limpiarFiltros=()=>{
    ['f-desde','f-hasta','f-prod','f-checker','f-nlote'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('f-dict').value='';
    lotesFiltrados=[...baseFiltro()];pagina=1;actualizarKPIs(lotesFiltrados);renderTabla();
  };

  // ── Modal ─────────────────────────────────────────────────────
  window.abrirModal=id=>{
    const l=todosLotes.find(x=>x.id===id);if(!l)return;loteActual=l;
    document.getElementById('m-lote').textContent=`Lote ${l.nLote||'—'}`;
    document.getElementById('m-sub').textContent=`${fmtF(l.fechaCreacion)} · ${l.producto||'—'} · ${l.cliente||'Sin cliente'}`;
    const campos=[['Producto',l.producto],['N° Lote',l.nLote],['Cliente',l.cliente||'—'],['Turno',l.turno],['Checker',l.checker],['Dictamen',l.dictamen],['Peso Min',l.pesoMin?l.pesoMin+' kg':'—'],['Peso Max',l.pesoMax?l.pesoMax+' kg':'—']];
    document.getElementById('m-campos').innerHTML=campos.map(([k,v])=>`<div class="mf"><label>${k}</label><span>${v||'—'}</span></div>`).join('');
    const pals=l.pallets||[];
    document.getElementById('m-pallets').innerHTML=pals.length
      ?pals.map(p=>`<div class="pal-card"><div class="pal-id">${p.id||'—'}</div><div class="pal-res ${p.resultado||''}">${p.resultado||'—'}</div>${p.peso?`<div style="font-size:.58rem;color:var(--muted);margin-top:.18rem;">${p.peso}kg</div>`:''}</div>`).join('')
      :`<div style="font-size:.72rem;color:var(--muted);">Sin datos de pallets.</div>`;
    cargarNCs(l.nLote);
    document.getElementById('modal-overlay').classList.add('open');
  };

  async function cargarNCs(nLote){
    const el=document.getElementById('m-nc-list');el.textContent='Buscando...';
    try{
      const q=query(collection(db,'nc_records'),where('nLote','==',nLote),orderBy('fechaDeteccion','desc'));
      const s=await getDocs(q);
      if(s.empty){el.textContent='✓ Sin NCs para este lote.';el.style.color='#22c55e';return;}
      el.style.color='var(--muted)';
      el.innerHTML=s.docs.map(d=>{const n=d.data();return`<div style="display:flex;gap:.4rem;align-items:center;padding:.28rem 0;border-bottom:1px solid var(--border);"><span class="badge ${n.estado==='Finalizado'?'b-APR':'b-PAR'}" style="font-size:.58rem;">${n.estado||'Pendiente'}</span><span style="font-size:.72rem;">${n.tipoDesvio||'—'}</span><span style="font-size:.65rem;color:var(--muted);margin-left:auto;">${n.gravedad||''}</span></div>`;}).join('');
    }catch{el.innerHTML=`<a href="registro_nc.html" style="color:var(--accent);font-size:.72rem;">Ver Registro NC →</a>`;}
  }

  window.cerrarModalClick=e=>{if(e.target===document.getElementById('modal-overlay'))cerrarModal();};
  window.cerrarModal=()=>{document.getElementById('modal-overlay').classList.remove('open');loteActual=null;};
  window.irANCs=()=>{if(loteActual?.nLote)window.location.href=`registro_nc.html#lote=${encodeURIComponent(loteActual.nLote)}`;};

  // ── Export ────────────────────────────────────────────────────
  window.exportarXLSX=()=>{
    const rows=[['Fecha','N° Lote','Cliente','Producto','Turno','Checker','Dictamen','OK','NOK+REPRO']];
    lotesFiltrados.forEach(l=>{const p=l.pallets||[];rows.push([fmtF(l.fechaCreacion),l.nLote||'',l.cliente||'',l.producto||'',l.turno||'',l.checker||'',l.dictamen||'',p.filter(x=>x.resultado==='OK').length,p.filter(x=>['NOK','REPRO'].includes(x.resultado)).length]);});
    const csv=rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
    const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'})),download:`historial_${Date.now()}.csv`});a.click();
  };

  window.pdfId=id=>{
    const l=todosLotes.find(x=>x.id===id);if(!l)return;
    const pals=(l.pallets||[]).map(p=>`<tr><td>${p.id||'—'}</td><td>${p.resultado||'—'}</td><td>${p.peso||'—'}</td></tr>`).join('');
    const bc=(l.dictamen||'').includes('PARCIAL')?'PARCIAL':(l.dictamen||'').includes('RETENIDO')?'RETENIDO':'APROBADO';
    const w=window.open('','_blank');
    w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Lote ${l.nLote}</title>
    <style>body{font-family:Arial,sans-serif;font-size:11px;padding:20px}h1{font-size:14px;margin-bottom:4px}h2{font-size:11px;margin:14px 0 4px;border-bottom:1px solid #ccc;padding-bottom:3px}table{width:100%;border-collapse:collapse}th,td{border:1px solid #ccc;padding:4px 6px;text-align:left}th{background:#f0f0f0;font-size:10px}.row{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:8px}.field label{font-size:9px;color:#666;display:block}.field span{font-weight:600}.badge{padding:2px 6px;border-radius:3px;font-size:10px;font-weight:600}.APROBADO{background:#d1fae5;color:#065f46}.RETENIDO{background:#fee2e2;color:#991b1b}.PARCIAL{background:#fef3c7;color:#92400e}@media print{body{padding:0}}</style>
    </head><body>
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div><div style="font-size:16px;font-weight:700;color:#065f46">AGROFACIL S.A.</div><h1>Control de Calidad — Detalle de Lote</h1>
      <div style="font-size:9px;color:#666">SGC-REG-01 · Checker: ${l.checker||'—'} · Fecha: ${fmtF(l.fechaCreacion)}</div></div>
      <span class="badge ${bc}">${l.dictamen||'—'}</span>
    </div>
    <h2>Datos del Lote</h2>
    <div class="row">${[['N° Lote',l.nLote],['Cliente',l.cliente||'—'],['Producto',l.producto],['Turno',l.turno],['Checker',l.checker],['Peso Min',l.pesoMin?l.pesoMin+'kg':'—'],['Peso Max',l.pesoMax?l.pesoMax+'kg':'—']].map(([k,v])=>`<div class="field"><label>${k}</label><span>${v||'—'}</span></div>`).join('')}</div>
    <h2>Pallets</h2>
    <table><thead><tr><th>ID Pallet</th><th>Resultado</th><th>Peso</th></tr></thead>
    <tbody>${pals||'<tr><td colspan="3">Sin datos</td></tr>'}</tbody></table>
    <div style="margin-top:40px;display:flex;gap:60px">
      <div style="border-top:1px solid #333;padding-top:4px;width:160px;text-align:center;font-size:9px">Checker de Calidad</div>
      <div style="border-top:1px solid #333;padding-top:4px;width:160px;text-align:center;font-size:9px">Coordinadora de Calidad</div>
    </div>
    <script>window.onload=()=>window.print()<\/script><script>
  function aplicarTema(t){document.documentElement.classList.toggle('light',t==='light');const b=document.getElementById('btn-theme');if(b)b.textContent=t==='light'?'🌙':'☀️';}
  function toggleTheme(){const n=document.documentElement.classList.contains('light')?'dark':'light';localStorage.setItem('theme',n);aplicarTema(n);}
  aplicarTema(localStorage.getItem('theme')||'dark');
<\/script>
</body></html>`);
    w.document.close();
  };

  window.exportarPDFLote=()=>{if(loteActual)pdfId(loteActual.id);};

</script>
<script>
function aplicarTema(t){document.documentElement.classList.toggle('light',t==='light');const b=document.getElementById('btn-theme');if(b)b.textContent=t==='light'?'🌙':'☀️';}
function toggleTheme(){const n=document.documentElement.classList.contains('light')?'dark':'light';localStorage.setItem('theme',n);aplicarTema(n);}
aplicarTema(localStorage.getItem('theme')||'dark');
</script>
