<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="28" height="28">
  <!-- Fondo del ícono -->
  <rect width="64" height="64" rx="12" fill="#111d1d"/>
  <!-- Cola (detrás del ring, que la tapa en el arranque) -->
  <polygon points="45,51 53,44 63,57 55,64" fill="#00c896"/>
  <!-- Q: ring filled (estilo fiel al original — cuadrado, rx=5) -->
  <rect x="7" y="6" width="50" height="50" rx="5" fill="#00c896"/>
  <!-- Q: depth line interna (sutil) -->
  <rect x="9" y="8" width="46" height="46" rx="4" fill="none" stroke="#071212" stroke-width="1.6"/>
  <!-- Q: hueco interior -->
  <rect x="17" y="15" width="30" height="30" rx="3" fill="#111d1d"/>
</svg>
