<!DOCTYPE html>
<html lang="es" style="background:#0d141f">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#0d141f">
  <title>QualityOS — Acceso</title>
  <link rel="icon"             type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="apple-touch-icon"                               href="/apple-touch-icon.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d141f;
      --surface:  #111c2a;
      --border:   #1e2f42;
      --border2:  #243649;
      --teal:     #2a6a6a;
      --teal-lit: #3d9090;
      --green:    #00c896;
      --text:     #e7eef6;
      --muted:    #5b6f86;
      --muted2:   #7a8fa8;
      --danger-bg:rgba(224,92,92,.10);
      --danger-bd:rgba(224,92,92,.25);
    }

    html, body {
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    /* ── Fondo atmosférico ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 15% 10%,  rgba(42,106,106,.13) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 85% 90%,  rgba(0,200,150,.07)  0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Grid de fondo ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(42,106,106,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(42,106,106,.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Wrapper ── */
    .wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Logo block ── */
    .logo-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2.2rem;
      animation: fadeUp .5s .0s cubic-bezier(.22,.68,0,1.2) both;
    }

    .iso {
      width: 82px;
      height: 82px;
      object-fit: contain;
    }

    .brand-name {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: .06em;
      color: var(--text);
      line-height: 1;
      text-align: center;
    }
    .brand-name span { color: var(--green); }

    .brand-sub {
      font-size: .6rem;
      letter-spacing: .28em;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: .3rem;
      text-align: center;
    }

    .empresa-badge {
      font-size: .68rem;
      letter-spacing: .16em;
      color: var(--teal-lit);
      text-transform: uppercase;
      margin-top: .45rem;
      text-align: center;
      opacity: 0;
      transition: opacity .4s;
    }
    .empresa-badge.loaded { opacity: 1; }

    /* ── Card ── */
    .card {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem 2rem 1.6rem;
      box-shadow:
        0 0 0 1px rgba(42,106,106,.08),
        0 24px 64px rgba(0,0,0,.55),
        inset 0 1px 0 rgba(255,255,255,.03);
      animation: fadeUp .5s .1s cubic-bezier(.22,.68,0,1.2) both;
    }

    .card-title {
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: .24em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    /* ── Campos ── */
    .field { margin-bottom: 1rem; }

    label {
      display: flex;
      align-items: center;
      gap: .4rem;
      font-size: .6rem;
      font-weight: 600;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .45rem;
    }
    label svg { flex-shrink: 0; opacity: .7; }

    /* ── Input wrapper para ojito ── */
    .input-wrap {
      position: relative;
    }
    .input-wrap input {
      padding-right: 2.6rem;
    }

    .eye-btn {
      position: absolute;
      right: .75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      color: var(--muted);
      display: flex;
      align-items: center;
      transition: color .2s;
    }
    .eye-btn:hover { color: var(--muted2); }

    input {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border2);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: .9rem;
      padding: .7rem .9rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      -webkit-text-fill-color: var(--text);
      color-scheme: dark;
    }
    input:focus {
      border-color: var(--teal-lit);
      box-shadow: 0 0 0 3px rgba(42,106,106,.18);
    }
    input::placeholder { color: var(--muted); opacity: .5; }
    input:-webkit-autofill {
      -webkit-box-shadow: 0 0 0 100px var(--bg) inset !important;
      -webkit-text-fill-color: var(--text) !important;
    }

    /* ── Botón principal ── */
    .btn {
      width: 100%;
      background: var(--teal);
      color: #e7eef6;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: .76rem;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      padding: .85rem;
      cursor: pointer;
      margin-top: .5rem;
      position: relative;
      overflow: hidden;
      transition: background .2s, transform .1s;
    }
    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,.06) 0%, transparent 60%);
      pointer-events: none;
    }
    .btn:hover:not(:disabled)  { background: var(--teal-lit); }
    .btn:active:not(:disabled) { transform: scale(.985); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }

    /* ── Error ── */
    .error {
      background: var(--danger-bg);
      border: 1px solid var(--danger-bd);
      border-radius: 8px;
      color: #f48a8a;
      font-size: .73rem;
      letter-spacing: .04em;
      padding: .65rem .9rem;
      margin-top: .9rem;
      display: none;
      line-height: 1.5;
    }
    .error.show { display: block; }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 13px;
      height: 13px;
      border: 2px solid rgba(231,238,246,.25);
      border-top-color: #e7eef6;
      border-radius: 50%;
      animation: spin .65s linear infinite;
      vertical-align: middle;
      margin-right: .5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Divider ── */
    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin: 1.2rem 0 1rem;
    }

    /* ── Link contacto ── */
    .contacto {
      text-align: center;
      font-size: .65rem;
      letter-spacing: .06em;
      color: var(--muted);
      margin-top: 1.2rem;
    }
    .contacto a {
      color: var(--teal-lit);
      text-decoration: none;
      transition: color .2s;
    }
    .contacto a:hover { color: var(--green); }

    /* ── Botón instalar PWA ── */
    .btn-inst {
      display: none;
      width: 100%;
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--muted2);
      border-radius: 8px;
      font-family: inherit;
      font-size: .66rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      padding: .6rem;
      cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    .btn-inst:hover { border-color: var(--teal); color: var(--teal-lit); }

    /* ── Footer ── */
    .footer {
      margin-top: 1.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .55rem;
      font-size: .58rem;
      letter-spacing: .14em;
      color: var(--muted);
      opacity: .5;
      text-transform: uppercase;
      animation: fadeUp .5s .2s cubic-bezier(.22,.68,0,1.2) both;
    }

    /* Punto teal titilando */
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1;   transform: scale(1); }
      50%       { opacity: .35; transform: scale(.75); }
    }
  </style>
</head>
<body>

<div class="wrap">

  <!-- Logo + marca -->
  <div class="logo-block">
    <img src="/qualityos-topbar.svg" alt="QualityOS" class="iso">
    <div>
      <div class="brand-name">Quality<span>OS</span></div>
      <div class="brand-sub">Sistema de Gestión de Calidad</div>
      <div class="empresa-badge" id="empresaBadge">—</div>
    </div>
  </div>

  <!-- Card de login -->
  <div class="card">
    <div class="card-title">Acceso al sistema</div>

    <!-- Email -->
    <div class="field">
      <label for="email">
        <!-- Ícono correo -->
        <svg width="13" height="13" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="4" width="16" height="12" rx="2" stroke="currentColor" stroke-width="1.6"/>
          <path d="M2 7l8 5 8-5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        Correo electrónico
      </label>
      <input type="email" id="email" placeholder="usuario@empresa.com" autocomplete="email">
    </div>

    <!-- Contraseña -->
    <div class="field">
      <label for="pass">
        <!-- Ícono candado -->
        <svg width="12" height="13" viewBox="0 0 20 22" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="10" width="14" height="11" rx="2" stroke="currentColor" stroke-width="1.6"/>
          <path d="M7 10V7a3 3 0 0 1 6 0v3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          <circle cx="10" cy="15.5" r="1.2" fill="currentColor"/>
        </svg>
        Contraseña
      </label>
      <div class="input-wrap">
        <input type="password" id="pass" placeholder="••••••••" autocomplete="current-password">
        <button class="eye-btn" id="eyeBtn" type="button" onclick="togglePass()" title="Mostrar/ocultar contraseña" aria-label="Mostrar contraseña">
          <!-- Ojo cerrado (estado inicial) -->
          <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.7"/>
            <line x1="3" y1="3" x2="21" y2="21" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" class="eye-slash" style="display:none"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="btn" id="btnLogin" onclick="login()">Ingresar</button>

    <div class="error" id="errorMsg"></div>

    <!-- Link contacto -->
    <div class="contacto">
      ¿Problemas para ingresar?
      <a href="mailto:maxyroca7@gmail.com?subject=Problema%20de%20acceso%20QualityOS">Contactá al administrador</a>
    </div>

    <div class="divider" id="dividerInst" style="display:none"></div>
    <button class="btn-inst" id="btn-inst" onclick="instalarPWA()">📲 &nbsp;Instalar app</button>
  </div>

  <!-- Footer con punto teal titilando -->
  <div class="footer">
    <span class="status-dot"></span>
    <span style="white-space:nowrap">QUALITYOS &nbsp;·&nbsp; M.E. ROCA &nbsp;·&nbsp; V2.0</span>
  </div>

</div>

<!-- ═══════════════════════════════════════════
     Firebase Auth
═══════════════════════════════════════════ -->
<script type="module">
  import { auth, db } from './firebase-init.js';
  import { signInWithEmailAndPassword, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
  import { doc, getDoc }
    from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

  /* ── Nombre de empresa dinámico ── */
  async function cargarEmpresa() {
    try {
      const snap = await getDoc(doc(db, 'config', 'empresa'));
      if (snap.exists()) {
        const nombre = snap.data().nombre;
        if (nombre) {
          const badge = document.getElementById('empresaBadge');
          badge.textContent = nombre;
          badge.classList.add('loaded');
        }
      }
    } catch (_) { /* silencioso antes de auth */ }
  }
  cargarEmpresa();

  /* ── Redirect si ya autenticado ── */
  onAuthStateChanged(auth, user => {
    if (user) window.location.replace('./home.html');
  });

  /* ── Login ── */
  window.login = async function () {
    const email = document.getElementById('email').value.trim();
    const pass  = document.getElementById('pass').value;
    const btn   = document.getElementById('btnLogin');
    const err   = document.getElementById('errorMsg');

    err.classList.remove('show');

    if (!email || !pass) {
      err.textContent = 'Completá email y contraseña.';
      err.classList.add('show');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Ingresando…';

    try {
      await signInWithEmailAndPassword(auth, email, pass);
      window.location.replace('./home.html');
    } catch (e) {
      btn.disabled = false;
      btn.textContent = 'Ingresar';
      const msgs = {
        'auth/invalid-credential':     'Email o contraseña incorrectos.',
        'auth/user-not-found':         'No existe una cuenta con ese email.',
        'auth/wrong-password':         'Contraseña incorrecta.',
        'auth/too-many-requests':      'Demasiados intentos. Esperá unos minutos.',
        'auth/network-request-failed': 'Sin conexión. Verificá la red.',
      };
      err.textContent = msgs[e.code] || 'Error al ingresar. Intentá de nuevo.';
      err.classList.add('show');
    }
  };

  document.getElementById('pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.login();
  });
</script>

<!-- ═══════════════════════════════════════════
     Toggle ojito + PWA
═══════════════════════════════════════════ -->
<script>
  function togglePass() {
    const input = document.getElementById('pass');
    const slash = document.querySelector('.eye-slash');
    const showing = input.type === 'text';
    input.type = showing ? 'password' : 'text';
    slash.style.display = showing ? 'none' : 'inline';
  }

  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    window._installPrompt = e;
    document.getElementById('btn-inst').style.display = 'block';
    document.getElementById('dividerInst').style.display = 'block';
  });

  function instalarPWA() {
    if (window._installPrompt) {
      window._installPrompt.prompt();
      window._installPrompt.userChoice.then(r => {
        if (r.outcome === 'accepted') {
          document.getElementById('btn-inst').style.display = 'none';
          document.getElementById('dividerInst').style.display = 'none';
        }
        window._installPrompt = null;
      });
    } else {
      alert('Menú ⋮ → "Agregar a pantalla de inicio"');
    }
  }
</script>

</body>
</html>
