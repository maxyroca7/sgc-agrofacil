// ── Escaneo QR / barcode (BarcodeDetector API) ──────────────────────────────
const _bdSupported = true; /* QR siempre: BarcodeDetector nativo o jsQR fallback */
let _bdDetector = null;
if (_bdSupported) {
  try {
    _bdDetector = new BarcodeDetector({
      formats: ['qr_code','ean_13','ean_8','code_128','code_39','data_matrix','upc_a','upc_e']
    });
  } catch(e) { console.warn('[scan] BarcodeDetector init:', e.message); }
}
let _scanStream = null, _scanRaf = null;

async function _openScanner(label, onSuccess) {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    mostrarToast('⚠ Cámara no disponible en este dispositivo');
    return;
  }
  const ov = document.createElement('div');
  ov.id = 'scan-overlay';
  ov.innerHTML = `<div class="scan-modal">
    <div class="scan-hdr"><span><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg> Escanear — ${label}</span>
      <button onclick="cerrarScan()">✕</button></div>
    <video id="scan-video" autoplay playsinline muted></video>
    <div id="scan-status">Apuntá la cámara al código QR o de barras…</div>
  </div>`;
  document.body.appendChild(ov);
  try {
    _scanStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    const vid = document.getElementById('scan-video');
    vid.srcObject = _scanStream;
    await vid.play();
    _scanLoopCb(vid, onSuccess);
  } catch(e) {
    cerrarScan();
    mostrarToast('⚠ Sin acceso a cámara: ' + e.message);
  }
}

async function _scanLoopCb(vid, onSuccess) {
  if (!document.getElementById('scan-overlay')) return;
  try {
    if (_bdDetector) {
      const codes = await _bdDetector.detect(vid);
      if (codes.length) { cerrarScan(); onSuccess(codes[0].rawValue); return; }
    } else if (typeof jsQR !== 'undefined' && vid.videoWidth) {
      const c = document.createElement('canvas');
      c.width = vid.videoWidth; c.height = vid.videoHeight;
      const cx = c.getContext('2d', { willReadFrequently: true });
      cx.drawImage(vid, 0, 0, c.width, c.height);
      const img = cx.getImageData(0, 0, c.width, c.height);
      const code = jsQR(img.data, img.width, img.height);
      if (code && code.data) { cerrarScan(); onSuccess(code.data); return; }
    }
  } catch(e) { /* frame no listo */ }
  _scanRaf = requestAnimationFrame(() => _scanLoopCb(vid, onSuccess));
}

function cerrarScan() {
  cancelAnimationFrame(_scanRaf);
  _scanRaf = null;
  if (_scanStream) { _scanStream.getTracks().forEach(t => t.stop()); _scanStream = null; }
  const ov = document.getElementById('scan-overlay');
  if (ov) ov.remove();
}

function _qrBadgeHTML(qrCode, urlCargada) {
  if (!qrCode) return '';
  if (urlCargada === true)  return '<span class="qr-url-badge qr-url-ok">URL ✓</span>';
  if (urlCargada === false) return '<span class="qr-url-badge qr-url-nok">URL ✗</span>';
  return '<span class="qr-url-badge qr-url-unk">sin verificar</span>';
}

async function _resolverURLDestino(shortUrl) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 7000);
  try {
    const r = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(shortUrl), { signal: ctrl.signal });
    clearTimeout(timer);
    if (!r.ok) return null;
    const j = await r.json();
    const finalUrl = j && j.status && j.status.url;
    return (finalUrl && finalUrl !== shortUrl) ? finalUrl : null;
  } catch (e) {
    clearTimeout(timer);
    return null;
  }
}

function _mostrarModalQR(rawVal, label, onConfirm) {
  const isUrl = typeof rawVal === 'string' && rawVal.startsWith('http');
  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  const ov = document.createElement('div');
  ov.id = 'qr-modal-overlay';
  ov.innerHTML = `<div class="qr-modal">
    <div class="qr-modal-hdr">
      <span>QR Escaneado — ${esc(label)}</span>
      <button id="qr-mx" style="background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;padding:0 4px;line-height:1">✕</button>
    </div>
    <div class="qr-modal-body">
      <div><div class="qr-modal-label">URL escaneada</div><div class="qr-modal-val">${esc(rawVal)}</div></div>
      ${isUrl ? `<div><div class="qr-modal-label">URL completa</div><div class="qr-modal-val" id="qr-dest" style="word-break:break-all">⏳ Resolviendo…</div></div>` : ''}
      ${isUrl ? `<button id="qr-abrir" style="align-self:flex-start;background:rgba(96,165,250,.12);color:#60a5fa;border:1px solid #60a5fa;border-radius:var(--r);padding:6px 12px;font-size:12px;cursor:pointer">🔗 Abrir</button>` : ''}
      <hr class="qr-modal-sep">
      <div class="qr-modal-q">¿URL cargada en el sistema?</div>
      <div class="qr-modal-acts">
        <button id="qr-cargada" style="flex:1;background:rgba(22,163,74,.13);color:#16a34a;border:1px solid #16a34a;border-radius:var(--r);padding:10px 8px;font-size:13px;font-weight:700;cursor:pointer">✓ CARGADA</button>
        <button id="qr-nocargada" style="flex:1;background:rgba(220,38,38,.13);color:#dc2626;border:1px solid #dc2626;border-radius:var(--r);padding:10px 8px;font-size:13px;font-weight:700;cursor:pointer">✗ NO CARGADA</button>
        <button id="qr-cancelar" style="background:transparent;color:var(--text3);border:1px solid var(--border2);border-radius:var(--r);padding:10px 8px;font-size:13px;cursor:pointer">Cancelar</button>
      </div>
    </div>
  </div>`;
  document.body.appendChild(ov);
  function cerrar(){ const el=document.getElementById('qr-modal-overlay');if(el)el.remove(); }
  document.getElementById('qr-mx').addEventListener('click', cerrar);
  document.getElementById('qr-cancelar').addEventListener('click', cerrar);
  document.getElementById('qr-cargada').addEventListener('click', () => { cerrar(); onConfirm(rawVal, true); });
  document.getElementById('qr-nocargada').addEventListener('click', () => { cerrar(); onConfirm(rawVal, false); });

  if (isUrl) {
    let urlDestino = null;
    document.getElementById('qr-abrir').addEventListener('click', () => window.open(urlDestino || rawVal, '_blank'));
    _resolverURLDestino(rawVal).then(dest => {
      const el = document.getElementById('qr-dest');
      if (!el) return;
      if (dest) {
        urlDestino = dest;
        el.textContent = dest;
        el.style.color = 'var(--green)';
      } else {
        el.textContent = '(sin conexión — usá Abrir para verla)';
        el.style.color = 'var(--text3)';
      }
    });
  }
}

// TECLADO VIRTUAL — SOLUCIÓN DEFINITIVA ANDROID
//
// PROBLEMA: con position:fixed en #app, cuando el teclado
// virtual sube en Android, el campo activo puede quedar
// debajo del teclado y no ser visible.
//
// SOLUCIÓN EN DOS CAPAS:
// Capa 1 — visualViewport API:
//   Detecta el cambio de altura visible y ajusta el #app
//   al espacio real encima del teclado.
//   visualViewport.height = altura visible (sin teclado)
//   visualViewport.offsetTop = scroll del viewport visual
//
// Capa 2 — focusin event:
//   Cuando un campo recibe foco, hace scroll hacia él.
//   300ms de delay = tiempo que tarda el teclado en subir.
//
// NOTA: en Chrome Android 108+ el browser maneja esto
// automáticamente con el 'virtual-keyboard' CSS API.
// Este código es el fallback para versiones anteriores.
// ═══════════════════════════════════════════════════════════
(function(){
  const app = document.getElementById('app');

  // Capa 1: visualViewport
  if(window.visualViewport){
    function _ajustarViewport(){
      const vvp = window.visualViewport;
      // Fijar el app al área visual disponible (encima del teclado)
      app.style.height = vvp.height + 'px';
      app.style.top    = vvp.offsetTop + 'px';
      // Scroll al campo activo
      const focused = document.activeElement;
      if(focused && focused !== document.body){
        setTimeout(() => focused.scrollIntoView({block:'center', behavior:'smooth'}), 80);
      }
    }
    window.visualViewport.addEventListener('resize', _ajustarViewport);
    window.visualViewport.addEventListener('scroll', _ajustarViewport);
  }

  // Capa 2: focusin — scroll al campo al recibir foco
  document.addEventListener('focusin', function(e){
    const el = e.target;
    if(!el || el === document.body) return;
    if(el.tagName==='INPUT' || el.tagName==='TEXTAREA' || el.tagName==='SELECT'){
      // 300ms = animación típica del teclado en Android
      setTimeout(() => el.scrollIntoView({block:'center', behavior:'smooth'}), 300);
    }
  });
})()
