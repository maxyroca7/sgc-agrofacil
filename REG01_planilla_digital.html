<style>

/* ════════════════════════════════════════════════════════
   BLOQUE  CSS — SISTEMA DE DISEÑO
   Variables globales usadas en todo el archivo.
   Para cambiar el tema visual, modificar solo aquí.
   ════════════════════════════════════════════════════════ */
:root{
  --bg:#0c1414;--bg2:#121d1d;--bg3:#182424;
  --border:#243c3c;--border2:#2e5252;
  --accent:#2e9090;--accent2:#1d6565;
  --green:#8ab83c;--green-bg:#0b2210;
  --red:#ef4444;--red-bg:#2d0a0a;
  --yellow:#f59e0b;--orange:#fb923c;--orange-bg:#431407;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --mono:'JetBrains Mono',monospace;
  --sans:'Barlow Condensed',sans-serif;
  --r:6px;--touch:52px;--topbar-bg:rgba(18,29,29,.96);
}
/* ── TEMA LIGHT ── */
:root.light{
  --bg:#f0f5f2;--bg2:#ffffff;--bg3:#e8f0ec;
  --border:#cdddd6;--border2:#b5cfc5;
  --accent:#2e9090;--accent2:#1d6565;
  --green:#5d8500;--green-bg:#eef7d8;
  --red:#dc2626;--red-bg:#fee2e2;
  --yellow:#b45309;--orange:#c2410c;--orange-bg:#fff7ed;
  --text:#1a2e28;--text2:#4a7068;--text3:#6b9080;--topbar-bg:rgba(240,245,242,.96);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
/* dvh = dynamic viewport height: se recalcula automáticamente cuando
   el teclado virtual sube o baja. Soportado desde Chrome 108 (2022).
   Esto elimina la necesidad de position:fixed, visualViewport JS, y hacks. */
/* ═══════════════════════════════════════════════════
   ARQUITECTURA DE VIEWPORT — CRÍTICO PARA ANDROID
   
   svh (small viewport height) = altura SIN teclado virtual
   Cuando el teclado sube, svh se reduce → el contenido
   sube con él en lugar de quedar tapado.
   
   overflow:hidden en html/body evita el scroll del documento
   raíz — el único scroll permitido es dentro de .lote-view
   ═══════════════════════════════════════════════════ */
html,body{overflow:hidden !important;
  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
  
  -webkit-overflow-scrolling:touch;   /* scroll suave iOS */
  overscroll-behavior:none;           /* sin rebote */
}
/* position:fixed + inset:0 es el método más robusto.
   Fija el contenedor al viewport visual real,
   independientemente de cómo el browser maneje dvh/svh.
   El 100% de altura lo da inset:0, no height. */
#app{position:fixed;inset:0;
  display:flex;
  flex-direction:column;
  background:var(--bg);
}


/* ════════════════════════════════════════════════════════
   COMPONENTES DE LAYOUT
   Estructura principal: topbar → main → bottombar
   El scroll ocurre SOLO dentro de .lote-view
   ════════════════════════════════════════════════════════ */
/* ── TOP BAR ── */
#topbar{display:flex;align-items:center;background:var(--topbar-bg);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:0 14px;min-height:52px;flex-shrink:0;gap:8px}
.logo{font-family:var(--sans);font-weight:800;font-size:22px;color:var(--accent);letter-spacing:1px;white-space:nowrap}
.tb-left{display:flex;align-items:center;gap:.5rem;flex-shrink:0;margin-right:8px}
.tb-brand{font-size:.78rem;font-weight:600;color:var(--accent);letter-spacing:.06em;white-space:nowrap}
.tb-sep{color:var(--border2)}
.tb-title{font-size:.75rem;color:var(--text2);white-space:nowrap}
#tabs-wrap{display:flex;gap:4px;overflow-x:auto;flex:1;scrollbar-width:none;padding:6px 0;-webkit-overflow-scrolling:touch}
#tabs-wrap::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:5px 10px;border-radius:var(--r);background:var(--bg3);border:1px solid var(--border);font-family:var(--mono);font-size:10px;color:var(--text2);cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:6px;transition:.15s}
.tab.active{background:var(--accent2);border-color:var(--accent);color:#fff;font-weight:700}
.tab .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.tab .tc{font-size:13px;opacity:.4;margin-left:2px}
#btn-nl{flex-shrink:0;background:var(--green-bg);border:1px solid var(--green);color:var(--green);font-family:var(--sans);font-weight:700;font-size:12px;padding:7px 12px;border-radius:var(--r);cursor:pointer;white-space:nowrap}
#btn-nl:active{background:var(--green);color:#000}
#btn-cfg{flex-shrink:0;background:var(--bg3);border:1px solid var(--border2);color:var(--text3);font-size:17px;width:34px;height:34px;border-radius:var(--r);cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ── MAIN ── */
#main{flex:1;overflow:hidden;position:relative;min-height:0}

/* ── EMPTY ── */
#empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--text3)}
#empty-state .big{font-size:56px;opacity:.25}
#empty-state p{font-family:var(--mono);font-size:12px}
#empty-state button{padding:14px 28px;background:var(--accent2);border:none;border-radius:var(--r);color:#fff;font-family:var(--sans);font-weight:700;font-size:15px;cursor:pointer}

/* ── LOTE VIEW (scrollable) ── */
.lote-view{
  position:absolute;
  inset:0;
  overflow-y:scroll;
  overflow-x:hidden;
  padding:10px;
  padding-bottom:16px;
  display:flex;
  flex-direction:column;
  gap:10px;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior-y:contain;
}
/* Todo elemento dentro del área scrolleable permite scroll vertical */
/* touch-action correcto: pan-y solo en contenedores scrollables,
   manipulation en botones para que el tap sea instantáneo */
.lote-view{touch-action:pan-y}
.dbtn, .btn-ap, .ba, #btn-nl, #btn-cfg{touch-action:manipulation}
input, textarea, select{touch-action:manipulation}




/* ── Resumen litros CF ── */
.lts-summary{padding:8px 4px 4px}
.lts-row-cf{display:flex;align-items:center;gap:10px;flex-wrap:nowrap}
.lts-calc{display:flex;gap:8px;flex:1;justify-content:flex-end;flex-wrap:wrap}
.lts-item{display:flex;flex-direction:column;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:6px 10px;min-width:80px}
.lts-item b{font-family:var(--mono);font-size:13px;color:var(--text)}
.lts-item span{font-family:var(--mono);font-size:9px;color:var(--text3);text-transform:uppercase;margin-top:2px}
.lts-item.ok{border-color:var(--green)}
.lts-item.nok{border-color:var(--red)}
/* ── Navegación paginada Control en Línea ── */
.cl-nav{display:flex;align-items:center;justify-content:space-between;padding:10px 4px 6px;gap:8px}
.cl-nav-btn{background:var(--bg3);border:1px solid var(--accent);color:var(--accent);font-family:var(--mono);font-size:13px;font-weight:700;padding:10px 18px;border-radius:var(--r);cursor:pointer;min-height:44px;flex-shrink:0;touch-action:manipulation}
.cl-nav-btn:disabled{opacity:.3;border-color:var(--border);color:var(--text3);cursor:default}
.cl-nav-btn:active{background:var(--accent2);color:#fff}
.cl-nav-info{font-family:var(--mono);font-size:12px;color:var(--text2);text-align:center;flex:1}
/* ── Tarjetas plegables (Cabecera / Control en Línea / Final) ── */
/* ── CARD ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:clip}
.ch{display:flex;align-items:center;justify-content:space-between;padding:0 14px;height:56px;background:var(--bg3);border-bottom:1px solid var(--border);cursor:pointer;user-select:none;-webkit-user-select:none;overflow:hidden}
.ch-title{font-family:var(--sans);font-weight:700;font-size:13px;letter-spacing:.4px;text-transform:uppercase;color:var(--text2);display:flex;align-items:center;gap:6px;flex-wrap:nowrap;overflow:hidden;min-width:0}
.ch-badge{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:20px;background:var(--border);color:var(--text2)}
.ch-tog{font-size:16px;color:var(--text3);transition:.2s;flex-shrink:0}
.ch.collapsed .ch-tog{transform:rotate(-90deg)}
.cb{padding:12px}.cb.collapsed{display:none}


/* ── Campos de formulario: labels + inputs + selects ── */
/* ── FIELDS ── */
.cab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:8px}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-family:var(--mono);font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.fg input,.fg select{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);font-family:var(--mono);font-size:14px;padding:10px 10px;height:var(--touch);width:100%;outline:none;-webkit-appearance:none;transition:.15s}
.fg input:focus,.fg select:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(46,144,144,.2)}
.fg select option{background:var(--bg2)}

/* ── TABLA LÍNEA (desktop/landscape) ── */
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch;touch-action:pan-x;overscroll-behavior-x:contain}
.lt{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px;min-width:1020px}
.lt th{background:var(--bg3);color:var(--text3);font-size:8.5px;letter-spacing:.5px;text-transform:uppercase;padding:7px 5px;text-align:center;border-bottom:1px solid var(--border2);white-space:nowrap}
.lt th.gh{color:var(--accent);border-bottom:none;padding-bottom:2px}
.lt td{border-bottom:1px solid var(--border);padding:3px;vertical-align:middle}
.lt td.n{color:var(--text3);font-size:10px;text-align:center;width:24px;font-weight:700;padding:0 4px}
.lt input{background:transparent;border:none;border-radius:3px;color:var(--text);font-family:var(--mono);font-size:11px;padding:5px 4px;width:100%;outline:none;text-align:center;transition:.1s;min-height:32px;touch-action:pan-y}
.lt input:focus{background:var(--bg3);border:1px solid var(--accent)}
.lt input.npal{width:44px}.lt input.dinp{width:86px}.lt input.tinp{width:58px}.lt input.ninp{width:62px}

/* ── CARDS MÓVIL (portrait) ── */
.pallet-cards{display:flex;flex-direction:column;gap:8px}
.pcard{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:10px;display:flex;flex-direction:column;gap:8px;touch-action:manipulation}
.pcard.nok-card{border-color:var(--red);background:var(--red-bg)}
.pcard.repro-card{border-color:var(--orange);background:var(--orange-bg)}
.pcard-header{display:flex;align-items:center;justify-content:space-between;gap:8px}
.pcard-num{font-family:var(--mono);font-weight:700;font-size:18px;color:var(--accent);width:28px;flex-shrink:0}
.pcard-npal{font-family:var(--mono);font-size:11px;color:var(--text3)}
.pcard-row{display:grid;gap:6px}
.pcard-row.r2{grid-template-columns:1fr 1fr}
.pcard-row.r4{grid-template-columns:1fr 1fr 1fr 1fr}
.pf{display:flex;flex-direction:column;gap:3px}
.pf label{font-family:var(--mono);font-size:9px;color:var(--text3);text-transform:uppercase}
.pf input{background:var(--bg2);border:1px solid var(--border2);border-radius:4px;color:var(--text);font-family:var(--mono);font-size:13px;padding:8px 8px;width:100%;outline:none;min-height:40px;text-align:center;-webkit-appearance:none}
.pf input:focus{border-color:var(--accent)}


/* ── Botones de estado OK/NOK/REPRO ── */
/* ── OK/NOK ── */
.on{display:flex;gap:3px;justify-content:center;align-items:center}
.on button{min-width:40px;height:34px;border-radius:4px;border:1px solid var(--border2);font-family:var(--mono);font-size:10px;font-weight:700;cursor:pointer;background:var(--bg3);color:var(--text3);transition:.1s;flex-shrink:0;padding:0 6px;touch-action:manipulation}
/* ── Clase helper para touch-action en todos los elementos táctiles ──
   Reemplaza los 20 estilos inline touch-action:manipulation
   Se aplica automáticamente a botones y inputs via selector global */
.on button, .ba, .dbtn, .btn-ap, #btn-nl, #btn-cfg,
input, textarea, select, button {
  touch-action:manipulation; /* tap inmediato sin delay 300ms */
}
/* Excepciones: elementos que necesitan scroll horizontal */
.tw { touch-action:pan-x pan-y; }
.lote-view { touch-action:pan-y; }
.on button.ok.active{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.on button.nk.active{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.on button.rp.active{background:var(--orange-bg);border-color:var(--orange);color:var(--orange)}
.on button:active{opacity:.7}


/* ── Indicador visual de tolerancia de inducción ── */
/* ── SEMÁFORO ── */
.ind-cell{display:flex;align-items:center;gap:4px}
.sem{width:9px;height:9px;border-radius:50%;flex-shrink:0;background:var(--border2);transition:.2s}
.sem.ok{background:var(--green);box-shadow:0 0 5px var(--green)}
.sem.warn{background:var(--yellow);box-shadow:0 0 5px var(--yellow)}
.sem.nok{background:var(--red);box-shadow:0 0 5px var(--red)}

/* ── REPRO BADGE ── */
.repro-badge{display:inline-block;font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;background:var(--orange-bg);border:1px solid var(--orange);color:var(--orange);letter-spacing:.5px}

/* ── AGREGAR PALLET ── */
.btn-ap{width:100%;margin-top:6px;padding:11px;background:transparent;border:1px dashed var(--border2);border-radius:var(--r);color:var(--text3);font-family:var(--sans);font-weight:600;font-size:13px;cursor:pointer}
.btn-ap:active{border-color:var(--accent);color:var(--accent)}

/* ── TABLA FINAL ── */
.ft{border-collapse:collapse;font-family:var(--mono);font-size:11px;width:100%;min-width:520px}
.ft th{background:var(--bg3);color:var(--text3);font-size:8.5px;letter-spacing:.5px;text-transform:uppercase;padding:7px 5px;text-align:center;border:1px solid var(--border2)}
.ft th.gh{color:var(--yellow);border-bottom:none;padding-bottom:2px}
.ft td{border:1px solid var(--border);padding:3px 5px;text-align:center;vertical-align:middle}
.ft td.n{color:var(--text3);font-size:10px;width:26px;font-weight:700}
.ft textarea{background:transparent;border:none;color:var(--text);font-family:var(--mono);font-size:10px;padding:3px;width:100%;resize:none;outline:none;min-height:28px;touch-action:pan-y}
.ft textarea:focus{background:var(--bg3);border:1px solid var(--yellow);border-radius:2px}

/* ── DICTAMEN ── */
.drow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border2)}
.dbtn{padding:14px 8px;border-radius:var(--r);border:2px solid var(--border2);background:var(--bg3);cursor:pointer;font-family:var(--sans);font-weight:800;font-size:16px;letter-spacing:.5px;color:var(--text3);transition:.15s;display:flex;flex-direction:column;align-items:center;gap:3px;text-align:center}
.dbtn span{font-size:9px;font-weight:400;opacity:.6;letter-spacing:.4px}
.dbtn.ap.active{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.dbtn.ret.active{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.dbtn.mail.active{background:rgba(59,130,246,.1);border-color:var(--accent);color:var(--accent)}
.lts-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:10px}


/* ── Barra de acciones inferior: ISIS / NC / Turno / Guardar / Cerrar ── */
/* ── BOTTOM BAR ── */
#bb{background:var(--bg2);border-top:1px solid var(--border2);padding:7px 10px;display:flex;gap:6px;align-items:center;flex-shrink:0;flex-wrap:wrap}
.ba{padding:9px 10px;border-radius:var(--r);border:none;font-family:var(--sans);font-weight:700;font-size:12px;cursor:pointer;letter-spacing:.4px;white-space:nowrap;transition:.15s;flex:1;text-align:center}
.ba:active{opacity:.7}
.ba-isis{background:var(--accent2);color:#fff}
.ba-nc{background:#7c2d12;border:1px solid #ea580c;color:#fdba74}
.ba-rep{background:#112828;border:1px solid #2e9090;color:#9dd4d4}
.ba-sav{background:var(--bg3);border:1px solid var(--border2);color:var(--text2)}
.ba-cer{background:#374151;border:1px solid #6b7280;color:#d1d5db;margin-left:auto}
#sbar{flex:none!important;font-family:var(--mono);font-size:9px;color:var(--text3);display:flex;align-items:center;gap:5px;white-space:nowrap}
#sdot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── CONFIG INDUCTORAS ── */
.ind-cfg-row{display:grid;grid-template-columns:1fr 70px 70px 70px 50px;gap:6px;align-items:end;padding:10px 0;border-bottom:1px solid var(--border)}
.ind-cfg-row:last-child{border-bottom:none}
.ind-cfg-row label{font-family:var(--mono);font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:3px}
.ind-cfg-row input{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);font-family:var(--mono);font-size:12px;padding:7px 8px;width:100%;outline:none;height:38px}
.ind-cfg-row input:focus{border-color:var(--accent)}


/* ── Modales: Nuevo lote y Configuración de inductoras ── */
/* ── MODAL ── */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:flex-end;justify-content:center;z-index:100;padding:0}
.mo.show{display:flex}
@media(min-width:600px){.mo{align-items:center;padding:16px}}
.md{background:var(--bg2);border:1px solid var(--border2);border-radius:12px 12px 0 0;width:100%;max-width:600px;padding:20px;display:flex;flex-direction:column;gap:14px;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
@media(min-width:600px){.md{border-radius:10px;max-height:88vh}}
.md h2{font-family:var(--sans);font-weight:800;font-size:19px;color:var(--accent);letter-spacing:.5px}
.mf{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mf .full{grid-column:1/-1}
.ma{display:flex;gap:8px;justify-content:flex-end;margin-top:4px;padding-bottom:env(safe-area-inset-bottom)}
.ma button{padding:12px 22px;border-radius:var(--r);border:none;font-family:var(--sans);font-weight:700;font-size:14px;cursor:pointer}
.btn-ok2{background:var(--accent2);color:#fff}
.btn-cancel{background:var(--bg3);border:1px solid var(--border2)!important;color:var(--text2)}
.cfg-help{font-family:var(--mono);font-size:10px;color:var(--text3);line-height:1.7;padding:9px 11px;background:var(--bg3);border-radius:var(--r);border:1px solid var(--border)}


/* ── Notificación flotante temporal ── */
/* ── TOAST ── */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:9px 18px;font-family:var(--mono);font-size:11px;color:var(--text);opacity:0;transition:.3s;pointer-events:none;z-index:200;white-space:nowrap;max-width:90vw;text-align:center}
#toast.show{opacity:1}


/* ════════════════════════════════════════════════════════
   RESPONSIVE / BREAKPOINTS
   ≤900px portrait → tarjetas (celular/tablet vertical)
   >900px o landscape → tabla (tablet horizontal/desktop)
   ════════════════════════════════════════════════════════ */
/* ── RESPONSIVE ── */
/* Tabla en landscape/desktop, tarjetas en portrait/móvil */
.show-table{display:block}.show-cards{display:none}
@media(max-width:900px) and (orientation:portrait){
  .show-table{display:none!important}
  .show-cards{display:block!important}
  .drow,.lts-row{grid-template-columns:1fr}
  .mf{grid-template-columns:1fr}
  .ind-cfg-row{grid-template-columns:1fr 60px 60px 60px}
  #bb{padding:6px 8px}
  .ba{padding:8px 10px;font-size:11px}
}
@media(max-width:500px){
  .drow,.lts-row{grid-template-columns:1fr}
  .mf{grid-template-columns:1fr}
}
/* ── TOPBAR MOBILE: pestañas en segunda fila cuando hay poco espacio ── */
@media(max-width:560px){
  #topbar{flex-wrap:wrap;padding:6px 10px;min-height:auto;gap:4px}
  #tabs-wrap{order:10;width:100%;flex:none;border-top:1px solid var(--border);padding:4px 0 2px;margin-top:2px;min-height:0}
  #tabs-wrap:empty{display:none}
  .tab{font-size:9px;padding:4px 8px;gap:4px}
  .tb-left{gap:.35rem;margin-right:4px}
}
/* ── OVERLAY ROTAR DISPOSITIVO ── */
#rotate-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);
  z-index:500;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;padding:32px;text-align:center
}
#rotate-overlay .ri{font-size:60px;animation:rotAnim 2.5s ease-in-out infinite}
@keyframes rotAnim{0%,100%{transform:rotate(0deg)}40%,60%{transform:rotate(90deg)}}
#rotate-overlay p{font-family:var(--sans);font-size:18px;color:var(--text);line-height:1.6;max-width:280px}
#rotate-overlay p strong{color:var(--accent)}
#rotate-overlay .btn-cont{padding:13px 30px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);color:var(--text2);font-family:var(--sans);font-weight:700;font-size:14px;cursor:pointer;margin-top:6px}
/* Overlay de rotación desactivado — no bloquear scroll en portrait */
/* @media(max-width:900px) and (orientation:portrait){#rotate-overlay{display:flex}} */

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

<script>

// ════════════════════════════════════════════════════════
// BLOQUE JS 1 — CONFIGURACIÓN DE INDUCTORAS Y PWA
// cfg: objeto con inductoras (nombre, ref, tolerancias)
//      y clave de coordinadora para override de cierre.
// Se persiste en localStorage bajo CFG_KEY.
// ════════════════════════════════════════════════════════
// ══ CONFIG ══
const CFG_KEY='reg01_cfg_v1', LOTES_KEY='reg01_lotes_v3';
let cfg={inductoras:[
  {id:'A',nombre:'DCGY-F200',ref:1.2,tolMin:1.0,tolMax:1.4,unidad:''},
  {id:'B',nombre:'SKYM',ref:1.2,tolMin:1.0,tolMax:1.4,unidad:''},
  {id:'C',nombre:'ENERCON',ref:1.2,tolMin:1.0,tolMax:1.4,unidad:''},
  {id:'D',nombre:'INDUSMACH',ref:1.2,tolMin:1.0,tolMax:1.4,unidad:''},
  {id:'E',nombre:'LB-6000J',ref:1.2,tolMin:1.0,tolMax:1.4,unidad:''},
], claveCoord:'1234',
  docCodigo:'SGC-REG01-APP', docVersion:'00',
  docElab:'Maximiliano Roca', docAprob:'Evelin Alcaraz'};
function cargarCfg(){try{const s=localStorage.getItem(CFG_KEY);if(s){cfg=JSON.parse(s);if(!cfg.inductoras.find(i=>i.id==='E')){cfg.inductoras.push({id:'E',nombre:'LB-6000J',ref:1.2,tolMin:1.0,tolMax:1.4,unidad:''});localStorage.setItem(CFG_KEY,JSON.stringify(cfg));}}}catch(e){}}
function guardarCfg(){
  // Guardar nombre del RNC
  const nombreRNC=(document.getElementById('ci-rnc').value.trim())||'registro_nc.html';
  localStorage.setItem('reg01_rnc_nombre', nombreRNC);
  // Guardar clave coordinadora
  const clave=document.getElementById('ci-clave').value.trim();
  if(clave) cfg.claveCoord=clave;
  // Guardar codificación del documento
  // Codificación: solo editable desde el código fuente
  // Guardar inductoras
  cfg.inductoras.forEach((ind,i)=>{
    ind.nombre=(document.getElementById('ci-nom-'+i).value.trim())||ind.nombre;
    ind.ref=parseFloat(document.getElementById('ci-ref-'+i).value)||0;
    ind.tolMin=parseFloat(document.getElementById('ci-min-'+i).value)||0;
    ind.tolMax=parseFloat(document.getElementById('ci-max-'+i).value)||0;
    ind.unidad=document.getElementById('ci-uni-'+i).value.trim();
  });
  localStorage.setItem(CFG_KEY,JSON.stringify(cfg));
  cerrarMo('mo-cfg');poblarSelectInd();mostrarToast('✔ Inductoras guardadas');
  if(loteActivo)renderLote();
}
function renderCfgPanel(){
  const nombreActual=localStorage.getItem('reg01_rnc_nombre')||'registro_nc.html';
  document.getElementById('ind-cfg-rows').innerHTML=`
    <div style="padding:10px 0;border-bottom:1px solid var(--border);margin-bottom:4px">
      <div style="font-family:var(--mono);font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">
        📄 Codificación del documento (aparece en PDF)
      </div>
      <div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;font-family:var(--mono)">
        <div style="display:flex;border-bottom:1px solid var(--border)">
          <span style="width:90px;padding:7px 10px;background:var(--bg3);color:var(--text3);font-size:9px;text-transform:uppercase;letter-spacing:.4px;border-right:1px solid var(--border)">Código</span>
          <span style="padding:7px 10px;color:var(--text);font-size:11px">${cfg.docCodigo||'SGC-REG01-APP'}</span>
        </div>
        <div style="display:flex;border-bottom:1px solid var(--border)">
          <span style="width:90px;padding:7px 10px;background:var(--bg3);color:var(--text3);font-size:9px;text-transform:uppercase;letter-spacing:.4px;border-right:1px solid var(--border)">Versión</span>
          <span style="padding:7px 10px;color:var(--text);font-size:11px">${cfg.docVersion||'00'}</span>
        </div>
        <div style="display:flex;border-bottom:1px solid var(--border)">
          <span style="width:90px;padding:7px 10px;background:var(--bg3);color:var(--text3);font-size:9px;text-transform:uppercase;letter-spacing:.4px;border-right:1px solid var(--border)">Elaborado</span>
          <span style="padding:7px 10px;color:var(--text);font-size:11px">${cfg.docElab||'Maximiliano Roca'}</span>
        </div>
        <div style="display:flex">
          <span style="width:90px;padding:7px 10px;background:var(--bg3);color:var(--text3);font-size:9px;text-transform:uppercase;letter-spacing:.4px;border-right:1px solid var(--border)">Aprobado</span>
          <span style="padding:7px 10px;color:var(--text);font-size:11px">${cfg.docAprob||'Evelin Alcaraz'}</span>
        </div>
      </div>
    </div>
    <div style="padding:10px 0;border-bottom:1px solid var(--border);margin-bottom:4px">
      <div style="font-family:var(--mono);font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">
        Archivo del Registro de NC (misma carpeta)
      </div>
      <div class="ind-cfg-row" style="grid-template-columns:1fr 1fr;border:none;padding:0">

        <div style="display:flex;align-items:flex-end">
          <div style="font-family:var(--mono);font-size:10px;color:var(--text3);padding:4px 0;line-height:1.5">

        <div><label>Clave numérica</label>
          <input id="ci-clave" type="password" value="${cfg.claveCoord||'1234'}"
            placeholder="Clave de 4 dígitos"

          <div style="font-family:var(--mono);font-size:10px;color:var(--text3);padding:4px 0;line-height:1.6">

    </div>
  `+`<div style="display:flex;align-items:center;gap:10px;margin:14px 0 6px;padding-top:10px;border-top:1px solid var(--border)">
    <span style="font-size:16px">🔧</span>
    <span style="font-family:var(--sans);font-weight:800;font-size:16px;color:var(--accent);letter-spacing:.5px">INDUCTORAS</span>
  </div>
  <div class="cfg-help" style="margin-bottom:8px">Nombre real en planta · Valor de referencia · Tolerancia mínima y máxima · Unidad<br>
  El semáforo 🟢🟡🔴 se actualiza al tipear el valor en la tabla.</div>`+cfg.inductoras.map((ind,i)=>`
    <div class="ind-cfg-row">
      <div><label>Nombre</label><input id="ci-nom-${i}" type="text" value="${ind.nombre}"></div>
      <div><label>Ref.</label><input id="ci-ref-${i}" type="number" step="0.01" value="${ind.ref}"></div>
      <div><label>Tol.mín</label><input id="ci-min-${i}" type="number" step="0.01" value="${ind.tolMin}"></div>
      <div><label>Tol.máx</label><input id="ci-max-${i}" type="number" step="0.01" value="${ind.tolMax}"></div>
      <div><label>Unidad</label><input id="ci-uni-${i}" type="text" value="${ind.unidad}" placeholder="°C"></div>
    </div>`).join('');
}
function poblarSelectInd(){
  const s=document.getElementById('ml-ind');
  s.innerHTML=cfg.inductoras.map(i=>`<option value="${i.id}">${i.nombre}</option>`).join('');
}


// ════════════════════════════════════════════════════════
// BLOQUE JS 2 — SEMÁFORO DE INDUCCIÓN
// Compara el valor ingresado contra la tolerancia.
// Retorna: "ok" | "warn" (±30% fuera) | "nok" | ""
// ════════════════════════════════════════════════════════
// ══ SEMÁFORO ══
function semaforo(val,indId){
  const ind=cfg.inductoras.find(i=>i.id===indId);
  if(!ind||val===''||val===null)return '';
  const v=parseFloat(val);if(isNaN(v))return '';
  if(v>=ind.tolMin&&v<=ind.tolMax)return 'ok';
  const m=(ind.tolMax-ind.tolMin)*0.3;
  if(v>=ind.tolMin-m&&v<=ind.tolMax+m)return 'warn';
  return 'nok';
}


// ════════════════════════════════════════════════════════
// BLOQUE JS 3 — MÁSCARA DE FECHA
// Formatea automáticamente input de texto a dd/mm/aaaa.
// Se usa en todos los campos de fecha del sistema.
// ════════════════════════════════════════════════════════
// ══ MÁSCARA FECHA dd/mm/aaaa ══
function mskF(inp){
  let v=inp.value.replace(/\D/g,'');
  if(v.length>2)v=v.slice(0,2)+'/'+v.slice(2);
  if(v.length>5)v=v.slice(0,5)+'/'+v.slice(5,9);
  inp.value=v;
}

// ══ MÁSCARA HORA HH:MM (24h) ══
function mskT(inp){
  let v=inp.value.replace(/\D/g,'');
  // Limitar horas 0-23
  if(v.length>=2){
    let h=parseInt(v.slice(0,2));
    if(h>23)v='23'+v.slice(2);
  }
  // Limitar minutos 0-59
  if(v.length>=4){
    let m=parseInt(v.slice(2,4));
    if(m>59)v=v.slice(0,2)+'59';
  }
  if(v.length>2)v=v.slice(0,2)+':'+v.slice(2,4);
  inp.value=v;
}

// ── Formato automático de peso por pico (kg) ──
// Igual que hora: tipear dígitos, inserta punto tras 2ª cifra
// Ej: 2 → "2" | 22 → "22" | 223 → "22.3" | 2234 → "22.34" | 22345 → "22.345"
function fmtPeso(inp){
  let d=inp.value.replace(/\D/g,'');
  if(d.length>5)d=d.slice(0,5);
  inp.value=d.length<=2?d:d.slice(0,2)+'.'+d.slice(2);
  return inp.value;
}


// ════════════════════════════════════════════════════════
// BLOQUE JS 4 — ESTADO GLOBAL DE LA APLICACIÓN
// lotes[]: array de objetos lote en memoria RAM.
// loteActivo: id del lote actualmente visible.
// pendiente: true cuando hay cambios sin guardar.
// Persistencia: localStorage (LOTES_KEY).
// ════════════════════════════════════════════════════════
// ══ ESTADO ══
let lotes=[],loteActivo=null,pendiente=false,_resetScroll=false;
const CL_PAGE_SIZE=3;const clPages={};const CF_PAGE_SIZE=3;const cfPages={};
function cargarLotes(){try{const s=localStorage.getItem(LOTES_KEY);if(s)lotes=JSON.parse(s);}catch(e){lotes=[];}}
function guardarLotes(silent=true){
  try{localStorage.setItem(LOTES_KEY,JSON.stringify(lotes));}catch(e){}

// nuevoLote(cab, n): crea objeto lote con n pallets vacíos.
// nPL(num): nuevo pallet de Control en Línea.
//   Campos: nPal, fecha, hora, p1-p4 (pesos), lote, codProd,
//           fProd, fVenc, indOK, indVal, repro, obs
// nPF(): nuevo pallet de Control Final.
//   Campos: idOK, qrOK, paletOK, indCFOK, indCFVal,
//           repro, obs
// IMPORTANTE: al agregar un campo nuevo aquí, también
// actualizar: render, clipboard, acNC, palletsFaltantes.

// ══ MODELOS ══
const EC={activo:'#2e9090',cerrado:'#6b7280',aprobado:'#8ab83c',aprobado_parcial:'#f59e0b',retenido:'#ef4444'};
function nuevoLote(cab,n){
  const linea=[],fp=[];
  linea.push(nPL(1));for(let i=0;i<n;i++){fp.push(nPF());}
  return{id:Date.now(),estado:'activo',lastModified:Date.now(),cab:{...cab},linea,
    final:{fecha:'',controlador:'',sector:'',ltsPorPallet:'',pallets:fp,
           mailEnviado:null,dictamen:null,
           ltsAprobado:'',ltsRetenido:'',fechaDictamen:'',recepLogistica:''}};
}
function nPL(num){return{nPal:String(num),fecha:'',hora:'',p1:'',p2:'',p3:'',p4:'',
  lote:'',codProd:'',fProd:'',fVenc:'',indOK:null,indVal:'',repro:false,obs:'',pesoOK:null};}
function nPF(){return{idOK:null,qrOK:null,paletOK:null,indCFOK:null,indCFVal:'',repro:false,obs:'',litrosParcial:''};}
function getLote(){return lotes.find(l=>l.id===loteActivo);}

// BLOQUE JS 6 — GESTIÓN DE PESTAÑAS
// Cada lote abierto es una pestaña en la barra superior.
// renderTabs(): redibuja todas las pestañas.
// selLote(id): activa un lote y lo muestra.
// pedirEliminar(id): verifica completitud antes de eliminar.
//   Si faltan campos en CF → pide clave de coordinadora.
// ════════════════════════════════════════════════════════
// ══ TABS ══
function renderTabs(){
  const w=document.getElementById('tabs-wrap');w.innerHTML='';
  lotes.forEach(l=>{
    const t=document.createElement('div');
    t.className='tab'+(loteActivo===l.id?' active':'');
    const falt=palletsFaltantes(l);
    const lockIcon=l.estado==='activo'&&falt.length>0?'🔒 ':'';
    t.innerHTML=`<div class="dot" style="background:${EC[l.estado]||'#6b7280'}"></div>
      <span>${lockIcon}${l.cab.lote||'Sin lote'}</span>
      <span style="opacity:.5;font-size:9px">${(l.cab.prod||'').slice(0,9)}</span>
      ${l.estado==='activo'&&falt.length>0
        ? `<span style="font-size:9px;color:var(--yellow);opacity:.8" title="${falt.length} pallets sin completar en CF">${falt.length}⚠</span>`
        : ''}
      <span class="tc" onclick="event.stopPropagation();pedirEliminar(${l.id})">✕</span>`;
    t.onclick=()=>selLote(l.id);w.appendChild(t);
  });
}
function selLote(id){loteActivo=id;renderTabs();renderLote();document.getElementById('bb').style.display='flex';}
function pedirEliminar(id){
  const l=lotes.find(x=>x.id===id);
  if(!l)return;

  // Si el lote está activo, verificar completitud antes de eliminar
  if(l.estado==='activo'){
    const faltantes=palletsFaltantes(l);
    if(faltantes.length>0){
      const msg=
        `⛔ Este lote tiene ${faltantes.length} pallet(s) sin completar en Control Final.\n\n`+
        `No se puede cerrar ni eliminar hasta que estén todos controlados.\n\n`+
        `¿Sos la coordinadora y querés forzar la eliminación?`;
      if(!confirm(msg)) return;
      const claveIngresada=prompt('🔑 Clave de coordinadora:','');
      if(claveIngresada===null) return;
      if(claveIngresada.trim() !== String(cfg.claveCoord||'1234')){
        alert('❌ Clave incorrecta.');return;
      }
    } else {
      if(!confirm('¿Eliminar este lote del registro local?')) return;
    }
  } else {
    if(!confirm('¿Eliminar este lote del registro local?')) return;
  }

  lotes=lotes.filter(x=>x.id!==id);guardarLotes();
  loteActivo=lotes.length?lotes[lotes.length-1].id:null;
  renderTabs();loteActivo?renderLote():mostrarVacio();
}
function mostrarVacio(){
  document.getElementById('main').innerHTML=`<div id="empty-state"><div class="big">📋</div><p>No hay lotes activos</p><button onclick="abrirModalLote()">+ Nuevo lote</button></div>`;
  document.getElementById('bb').style.display='none';
}

function _lotesDelTurno(turno){
  const ahora=new Date();
  const hoy=new Date(ahora.getFullYear(),ahora.getMonth(),ahora.getDate());
  let desde,hasta;
  if(turno==='mañana'){
    desde=new Date(hoy);desde.setHours(6,0,0,0);
    hasta=new Date(hoy);hasta.setHours(14,0,0,0);
  } else if(turno==='tarde'){
    desde=new Date(hoy);desde.setHours(14,0,0,0);
    hasta=new Date(hoy);hasta.setHours(22,0,0,0);
  } else { // noche: 22h de ayer a 6h de hoy
    desde=new Date(hoy);desde.setDate(desde.getDate()-1);desde.setHours(22,0,0,0);
    hasta=new Date(hoy);hasta.setHours(6,0,0,0);
  }
  return lotes.filter(l=>{
    const m=l.lastModified||l.id;
    return m>=desde.getTime()&&m<=hasta.getTime();
  });
}

// BLOQUE JS 8 — RENDERIZADO DEL LOTE ACTIVO
// renderLote(): redibuja las 3 cards del lote.
//   Preserva la posición de scroll antes de redibujar.
// mkCabecera(l): card con datos del lote.
// mkLinea(l): card con control en línea.
//   En portrait (≤900px) → tarjetas .pcard apiladas.
//   En landscape (>900px) → tabla .lt con scroll horizontal.
// mkFinal(l): card con control final.
//   Siempre usa tarjetas .pcard (más táctil que tabla).
// PATRÓN: evento oninput → updX() → marcarPendiente()
//         eventos que cambian UI → renderLote() completo
// ════════════════════════════════════════════════════════
// ══ RENDER LOTE ══
function renderLote(){
  const l=getLote();if(!l)return;
  // Guardar posición de scroll antes de reconstruir el DOM
  const oldView=document.querySelector('.lote-view');
  const savedScroll=(_resetScroll||!oldView)?0:oldView.scrollTop;_resetScroll=false;

  if(document.activeElement&&document.activeElement!==document.body)document.activeElement.blur();
  const main=document.getElementById('main');main.innerHTML='';
  const view=document.createElement('div');view.className='lote-view';
  view.appendChild(mkCabecera(l));
  view.appendChild(mkLinea(l));
  view.appendChild(mkFinal(l));
  main.appendChild(view);

  // ── Scroll manual Android: intercepta touchmove y mueve scrollTop directo ──
  let _ty=0,_ty0=0,_scrolling=false;
  view.addEventListener('touchstart',e=>{_ty=_ty0=e.touches[0].clientY;_scrolling=true;},{passive:true});
  view.addEventListener('touchmove',e=>{
    if(!_scrolling)return;
    if(Math.abs(e.touches[0].clientY-_ty0)<4)return;
    const delta=_ty-e.touches[0].clientY;_ty=e.touches[0].clientY;
    view.scrollBy(0,delta);
  },{passive:true});
  view.addEventListener('touchend',()=>{_scrolling=false;},{passive:true});

  // Restaurar posición de scroll — triple rAF + setTimeout por si el browser hace scroll tardío
  const _rs=()=>{ if(view.isConnected)view.scrollTop=savedScroll; };
  requestAnimationFrame(()=>requestAnimationFrame(()=>requestAnimationFrame(_rs)));
  setTimeout(_rs,80);
  requestAnimationFrame(()=>actualizarISISBtn());
  // Actualizar botón cerrar con estado de completitud
  const btnCer=document.getElementById('btn-cerrar');
  if(btnCer&&l.estado==='activo'){
    const falt=palletsFaltantes(l);
    if(falt.length>0){
      btnCer.textContent=`🔒 Cerrar (${falt.length} CF)`;
      btnCer.title=`${falt.length} pallet(s) sin completar en Control Final`;
      btnCer.style.opacity='0.6';
    } else {
      btnCer.textContent='✕ Cerrar';
      btnCer.title='';
      btnCer.style.opacity='1';
    }
  }
}

function esMobPortrait(){return window.innerWidth<=900&&window.innerHeight>window.innerWidth;}

function getClPage(loteId){
  const l=lotes.find(x=>x.id===loteId);if(!l)return 0;
  const pages=Math.ceil(l.linea.length/CL_PAGE_SIZE);
  return Math.min(clPages[loteId]||0,Math.max(0,pages-1));
}
function setClPage(loteId,page){
  loteId=Number(loteId);
  const l=lotes.find(x=>x.id===loteId);if(!l)return;
  const pages=Math.ceil(l.linea.length/CL_PAGE_SIZE);
  clPages[loteId]=Math.max(0,Math.min(page,pages-1));
  const lv=document.querySelector('.lote-view');
  const clCard=[...document.querySelectorAll('.lote-view > .card')][1]; // CL es la segunda card
  const clTop=clCard&&lv?clCard.getBoundingClientRect().top-lv.getBoundingClientRect().top+lv.scrollTop+56:0;
  if(document.activeElement)document.activeElement.blur();
  renderLote();
  const _go=()=>{const v=document.querySelector('.lote-view');if(v)v.scrollTop=clTop;};
  requestAnimationFrame(()=>requestAnimationFrame(()=>requestAnimationFrame(_go)));
  setTimeout(_go,80);
}

function updL(i,k,v){
  const l=getLote();if(!l)return;
  l.linea[i][k]=v;
  // ── Verificar peso contra rango del lote ──
  if(['p1','p2','p3','p4'].includes(k)){
    const pMin=parseFloat(l.cab.pesoMin);
    const pMax=parseFloat(l.cab.pesoMax);
    if(!isNaN(pMin)&&!isNaN(pMax)){
      const picosConValor=['p1','p2','p3','p4'].filter(pk=>l.linea[i][pk]!=='');
      const picosFuera=picosConValor.filter(pk=>{
        const val=parseFloat(l.linea[i][pk]);
        return !isNaN(val)&&(val<pMin||val>pMax);
      });
      l.linea[i].pesoOK=picosConValor.length===0?null:picosFuera.length===0;
      patchPesoCard(i);
    }
  }
  marcarPendiente();
}
// ── patchPesoCard: actualiza badge de peso NOK en tarjeta CL ──
function patchPesoCard(i){
  const l=getLote();if(!l)return;
  const p=l.linea[i];
  const card=document.getElementById('cl-pallet-'+i);
  if(!card)return;
  const tieneNOK=p.indOK===false||p.pesoOK===false;
  card.className=tieneNOK&&!p.repro?'pcard nok-card':p.repro?'pcard repro-card':'pcard';
  card.id='cl-pallet-'+i;
  let pesoBadge=card.querySelector('.peso-nok-badge');
  if(p.pesoOK===false&&!pesoBadge){
    pesoBadge=document.createElement('span');
    pesoBadge.className='peso-nok-badge';
    pesoBadge.style.cssText='display:inline-block;font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;background:var(--red-bg);border:1px solid var(--red);color:var(--red);letter-spacing:.5px;margin-top:4px';
    pesoBadge.textContent='⚖ PESO NOK';
    const header=card.querySelector('.pcard-header');
    if(header)header.insertAdjacentElement('afterend',pesoBadge);
  } else if(p.pesoOK!==false&&pesoBadge){
    pesoBadge.remove();
  }
}
function updLSem(i,k,v,inp){
  const l=getLote();if(!l)return;l.linea[i][k]=v;marcarPendiente();
  // Actualizar semáforo de tabla
  const s=document.getElementById('sem-'+i);
  if(s)s.className='sem '+semaforo(v,l.cab.indId);
}
// ── patchCLCard: actualiza una tarjeta CL individual sin llamar renderLote() ──
function patchCLCard(i){
  const l=getLote();if(!l)return;
  const p=l.linea[i];
  const card=document.getElementById('cl-pallet-'+i);
  if(!card){renderLote();return;}
  const tieneNOK=p.indOK===false||p.pesoOK===false;
  // Clase del card
  card.className=tieneNOK&&!p.repro?'pcard nok-card':p.repro?'pcard repro-card':'pcard';
  card.id='cl-pallet-'+i; // preservar id
  // Botones OK/NOK
  const okBtn=card.querySelector('.ok');
  const nokBtn=card.querySelector('.nk');
  if(okBtn)okBtn.classList.toggle('active',p.indOK===true);
  if(nokBtn)nokBtn.classList.toggle('active',p.indOK===false);
  // REPRO button
  const onDiv=card.querySelector('.on');
  if(onDiv){
    const existingRepro=onDiv.querySelector('.rp');
    if(existingRepro)existingRepro.remove();
    if(p.indOK===false){
      const rp=document.createElement('button');
      rp.className='rp'+(p.repro?' active':'');
      rp.setAttribute('onclick','setRepro('+i+')');
      rp.title='Reprocesado';
      rp.textContent='REPRO';
      onDiv.appendChild(rp);
    }
  }
  // Repro badge
  let badge=card.querySelector('.repro-badge');
  if(p.repro&&!badge){
    badge=document.createElement('span');
    badge.className='repro-badge';
    badge.textContent='✓ REPROCESADO';
    const header=card.querySelector('.pcard-header');
    if(header)header.insertAdjacentElement('afterend',badge);
  } else if(!p.repro&&badge){
    badge.remove();
  }
}
function setIO(i,v){
  const l=getLote();if(!l)return;
  l.linea[i].indOK=l.linea[i].indOK===v?null:v;
  if(v===true)l.linea[i].repro=false;
  marcarPendiente();
  patchCLCard(i);
}
function setRepro(i){
  const l=getLote();if(!l)return;
  l.linea[i].repro=!l.linea[i].repro;
  marcarPendiente();
  patchCLCard(i);
}
function addPallet(){
  const l=getLote();if(!l)return;
  l.linea.push(nPL(l.linea.length+1));
  if(l.linea.length>l.final.pallets.length)l.final.pallets.push(nPF());
  marcarPendiente();
  clPages[l.id]=Math.ceil(l.linea.length/CL_PAGE_SIZE)-1;
  renderLote();
  // Scroll al pallet nuevo después del render
  setTimeout(()=>{
    const newCard=document.getElementById('cl-pallet-'+(l.linea.length-1));
    if(newCard)newCard.scrollIntoView({behavior:'smooth',block:'nearest'});
  },150);
}
function addPalletCF(){
  const l=getLote();if(!l)return;
  l.final.pallets.push(nPF());
  marcarPendiente();
  cfPages[l.id]=Math.ceil(l.final.pallets.length/CF_PAGE_SIZE)-1;
  // Actualizar DOM parcial sin renderLote
  const cardsDiv=document.getElementById('cf-cards-div');
  const navDiv=document.getElementById('cf-nav-div');
  if(!cardsDiv){renderLote();return;}
  cardsDiv.innerHTML=buildCFCardsHTML(l);
  if(navDiv)navDiv.innerHTML=buildCFNavHTML(l);
  actualizarLitrosCF();
  // Scroll al nuevo pallet
  setTimeout(()=>{
    const newCard=document.getElementById('cf-pallet-'+(l.final.pallets.length-1));
    if(newCard)newCard.scrollIntoView({behavior:'smooth',block:'nearest'});
  },50);
}
function deletePalletCF(i){
  const l=getLote();if(!l)return;
  if(!confirm('¿Eliminar pallet CF #'+(i+1)+'?'))return;
  l.final.pallets.splice(i,1);
  marcarPendiente();
  // Ajustar página si quedó vacía
  const totalPages=Math.max(1,Math.ceil(l.final.pallets.length/CF_PAGE_SIZE));
  cfPages[l.id]=Math.min(cfPages[l.id]||0,totalPages-1);
  // Actualizar DOM parcial
  const cardsDiv=document.getElementById('cf-cards-div');
  const navDiv=document.getElementById('cf-nav-div');

  if(navDiv)navDiv.innerHTML=buildCFNavHTML(l);

// ── Cálculo litros CF ──
function calcLitrosCF(l){
  const lpp=parseFloat(l.final.ltsPorPallet)||0;
  let ltsAp=0,ltsRet=0,aprobados=0,retenidos=0,pendientes=0;
  const anyLts=lpp>0||l.final.pallets.some(p=>parseFloat(p.litrosParcial)>0);
  l.final.pallets.forEach(p=>{
    const ok=p.idOK===true&&p.qrOK===true&&p.paletOK===true&&p.indCFOK===true;
    const nok=p.idOK===false||p.qrOK===false||p.paletOK===false||p.indCFOK===false;
    const lts=parseFloat(p.litrosParcial)||lpp; // parcial si existe, si no ltsPorPallet
    if(ok||(nok&&p.repro)){aprobados++;ltsAp+=lts;}
    else if(nok&&!p.repro){retenidos++;ltsRet+=lts;}
    else pendientes++;
  });
  return {aprobados,retenidos,pendientes,
    ltsAp:anyLts?ltsAp:null,
    ltsRet:anyLts?ltsRet:null};
}

    const i=_cfStart+ri;
    const tieneNOK=p.idOK===false||p.qrOK===false||p.paletOK===false||p.indCFOK===false;
    const vacio=p.idOK===null&&p.qrOK===null&&p.paletOK===null&&p.indCFOK===null?'pal-vacio':'';
    const cardCls=(tieneNOK&&!p.repro?'pcard nok-card':p.repro?'pcard repro-card':'pcard')+' '+vacio;
    const semCF=semaforo(p.indCFVal||'',l.cab.indId);
    function btn(fk,isOk){
      const cls=(isOk?'ok':'nk')+(p[fk]===(isOk?true:false)?' active':'');

      return '<button class="'+cls+'" onclick="'+ev+'" style="flex:1;height:48px;font-size:13px">'+lbl+'</button>';

      ?'<button class="on rp '+(p.repro?'active':'')+'" onclick="setFFRepro('+i+')" style="height:36px;padding:0 10px;border-radius:4px;border:1px solid var(--border2);font-family:var(--mono);font-size:10px;font-weight:700;cursor:pointer;background:var(--bg3);color:var(--text3)">REPRO</button>'
      :'';

      return '<div>'
        +'<div style="font-family:var(--mono);font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px">'+(label)+(extra||'')+'</div>'
        +'<div class="on" style="gap:8px">'+btn(fk,true)+btn(fk,false)+'</div>'
        +'</div>';
    };
    return '<div class="'+cardCls+'" id="cf-pallet-'+i+'">'
      +'<div class="pcard-header">'
        +'<span class="pcard-num">#'+(i+1)+'</span>'
        +'<span style="font-family:var(--mono);font-size:11px;color:var(--text3)">Pallet '+(p.nPal||i+1)+'</span>'
        +'<div style="display:flex;gap:6px;align-items:center;margin-left:auto">'+reproBtn+reproBadge
        +'<button onclick="deletePalletCF('+i+')" title="Eliminar pallet" '
          +'style="background:transparent;border:1px solid var(--border2);border-radius:4px;color:var(--text3);font-size:13px;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0">✕</button>'
        +'</div>'
      +'</div>'
      +'<div style="display:grid;gap:10px">'
        +row('ID Pallet','idOK')
        +row('Trazabilidad y QR','qrOK')
        +row('Estado del pallet','paletOK')
        +row('Inducci&#243;n CF','indCFOK','<span class="sem '+semCF+'" style="display:inline-block;margin-left:6px;vertical-align:middle"></span>')
        +'<div class="pf"><label>Lt parcial <span style="font-family:var(--mono);font-size:9px;color:var(--text3);font-weight:400">(vacío = pallet completo)</span></label>'
          +'<input type="number" step="1" min="1" value="'+(p.litrosParcial||'')+'" placeholder="dejar vacío si completo" '
          +'oninput="updFP('+i+",'litrosParcial',this.value);actualizarLitrosCF()\"></div>"
        +'<div class="pf"><label>Observaciones</label>'
          +'<input type="text" value="'+p.obs.replace(/"/g,'&quot;')+'" placeholder="&#8230;" oninput="updFP('+i+",'obs',this.value)\"></div>"
      +'</div>'

function buildCFNavHTML(l){
  const _cfPage=getCFPage(l.id);

    +'<button class="cl-nav-btn" onclick="setCFPage('+l.id+','+(_cfPage+1)+')" '+(_cfPage===_cfTotalPages-1?'disabled':'')+'">Sig \u2192</button>'

// ── Control Final ──
function getCFPage(loteId){
  const l=lotes.find(x=>x.id===loteId);if(!l)return 0;
  const pages=Math.ceil(l.final.pallets.length/CF_PAGE_SIZE);
  return Math.min(cfPages[loteId]||0,Math.max(0,pages-1));
}
function setCFPage(loteId,page){
  loteId=Number(loteId);
  const l=lotes.find(x=>x.id===loteId);if(!l)return;
  const pages=Math.ceil(l.final.pallets.length/CF_PAGE_SIZE);
  cfPages[loteId]=Math.max(0,Math.min(page,pages-1));
  if(document.activeElement)document.activeElement.blur();
  // Partial DOM update — sin renderLote
  const cardsDiv=document.getElementById('cf-cards-div');
  const navDiv=document.getElementById('cf-nav-div');
  if(!cardsDiv){renderLote();return;}
  cardsDiv.innerHTML=buildCFCardsHTML(l);
  if(navDiv)navDiv.innerHTML=buildCFNavHTML(l);
}
function mkFinal(l){
  const f=l.final;
  const ind=cfg.inductoras.find(i=>i.id===l.cab.indId)||{nombre:'Inductora',unidad:''};
  const indLbl=ind.nombre+(ind.unidad?' ('+ind.unidad+')':'');

  // ── CF paginado ──
  const _cfPage=getCFPage(l.id);
  const _cfTotal=f.pallets.length;
  const _cfTotalPages=Math.ceil(_cfTotal/CF_PAGE_SIZE);
  const _cfStart=_cfPage*CF_PAGE_SIZE;
  const _cfEnd=Math.min(_cfStart+CF_PAGE_SIZE,_cfTotal);
  const cfCards=buildCFCardsHTML(l);
  const cfNav=buildCFNavHTML(l);

  const nokCount=f.pallets.filter(p=>p.idOK===false||p.qrOK===false||p.paletOK===false||p.indCFOK===false).length;

    </div><span class="ch-tog">▾</span></div>
  <div class="cb collapsed">
    <div class="lts-summary" id="cf-lts-summary">
      <div class="lts-row-cf">
        <span style="font-family:var(--mono);font-size:10px;color:var(--text3);white-space:nowrap">Lt/pal</span>
        <input type="number" step="1" value="${f.ltsPorPallet||''}" placeholder="960"

          oninput="updF('ltsPorPallet',this.value);actualizarLitrosCF()">
        <div class="lts-calc">
          ${(()=>{const c=calcLitrosCF(l);
            const ap=c.ltsAp!=null?c.ltsAp.toFixed(0)+' lt':c.aprobados+' pal';
            const ret=c.ltsRet!=null?c.ltsRet.toFixed(0)+' lt':c.retenidos+' pal';
            return `<div class="lts-item ok">✅ <b>${ap}</b><span>Aprob.</span></div>
                    <div class="lts-item nok">🔴 <b>${ret}</b><span>Reten.</span></div>`;
          })()}
        </div>
      </div>
    </div>
    <div class="pallet-cards" id="cf-cards-div">${cfCards}</div>
    <div id="cf-nav-div">${cfNav}</div>
    <button class="btn-ap" onclick="addPalletCF()">+ Agregar pallet CF</button>
  </div>`;
  // Touch scroll manual para el contenido CF
  const cfCb=c.querySelector('.cb');
  if(cfCb){
    let _cfy=0,_cfy0=0,_cfsc=false;
    const lv=document.querySelector('.lote-view');
    cfCb.addEventListener('touchstart',e=>{_cfy=_cfy0=e.touches[0].clientY;_cfsc=true;},{passive:true});
    cfCb.addEventListener('touchmove',e=>{
      if(!_cfsc||!lv)return;
      if(Math.abs(e.touches[0].clientY-_cfy0)<4)return;
      const d=_cfy-e.touches[0].clientY;_cfy=e.touches[0].clientY;
      lv.scrollBy(0,d);
    },{passive:true});
    cfCb.addEventListener('touchend',()=>{_cfsc=false;},{passive:true});
  }
  return c;
}

function patchCFCard(i){
  const l=getLote();if(!l)return;
  const p=l.final.pallets[i];
  const card=document.getElementById('cf-pallet-'+i);
  if(!card){renderLote();return;}
  const tieneNOK=p.idOK===false||p.qrOK===false||p.paletOK===false||p.indCFOK===false;
  // Clase del card
  card.className=tieneNOK&&!p.repro?'pcard nok-card':p.repro?'pcard repro-card':'pcard';
  // Botones OK/NOK: buscar por onclick
  ['idOK','qrOK','paletOK','indCFOK'].forEach(fk=>{
    const ok=card.querySelector(`.ok[onclick*="'${fk}'"],[onclick*='"${fk}"']`)||
             [...card.querySelectorAll('button.ok')].find(b=>b.getAttribute('onclick')?.includes(fk));
    const nok=card.querySelector(`.nk[onclick*="'${fk}'"],[onclick*='"${fk}"']`)||
              [...card.querySelectorAll('button.nk')].find(b=>b.getAttribute('onclick')?.includes(fk));
    if(ok){ok.classList.toggle('active',p[fk]===true);}
    if(nok){nok.classList.toggle('active',p[fk]===false);}
  });
  // REPRO button + badge en header
  const flex=card.querySelector('div[style*="margin-left:auto"]');
  if(flex){
    flex.innerHTML=(tieneNOK
      ?`<button class="on rp ${p.repro?'active':''}" onclick="setFFRepro(${i})" style="height:36px;padding:0 10px;border-radius:4px;border:1px solid var(--border2);font-family:var(--mono);font-size:10px;font-weight:700;cursor:pointer;background:var(--bg3);color:var(--text3)">REPRO</button>`
      :'')+(p.repro?'<span class="repro-badge">✓</span>':'');
  }
  // Actualizar contador NOK en header de CF
  const nokTotal=l.final.pallets.filter(p=>p.idOK===false||p.qrOK===false||p.paletOK===false||p.indCFOK===false).length;
  const cfHeader=document.querySelector('.ch-title span[style*="red"]');
  if(nokTotal>0&&cfHeader)cfHeader.textContent=nokTotal+' NOK';
  else if(nokTotal===0&&cfHeader)cfHeader.remove();
  // Botón Cerrar
  const btnCer=document.getElementById('btn-cerrar');
  if(btnCer&&l.estado==='activo'){
    const falt=palletsFaltantes(l);
    btnCer.textContent=falt.length>0?`🔒 Cerrar (${falt.length} CF)`:'✓ Cerrar lote';
  }
  actualizarLitrosCF();
  actualizarISISBtn();
  marcarPendiente();
}
function setFF(i,k,v){
  const l=getLote();if(!l)return;
  l.final.pallets[i][k]=l.final.pallets[i][k]===v?null:v;
  const p=l.final.pallets[i];
  const tieneNOK_sf=p.idOK===false||p.qrOK===false||p.paletOK===false||p.indCFOK===false;

  if(p.idOK===true&&p.qrOK===true&&p.paletOK===true&&p.indCFOK===true)p.repro=false;
  patchCFCard(i);
}

function acNC(){
  const l=getLote();if(!l)return;
  const nokInd  = l.linea.filter(p=>p.indOK===false&&!p.repro);
  const reproInd = l.linea.filter(p=>p.indOK===false&&p.repro);
  const nokFin  = l.final.pallets.filter(p=>(p.idOK===false||p.qrOK===false||p.paletOK===false||p.indCFOK===false)&&!p.repro);
  const reproFin = l.final.pallets.filter(p=>(p.idOK===false||p.qrOK===false||p.paletOK===false||p.indCFOK===false)&&p.repro);
  // ── Peso fuera de especificación ──
  const nokPeso = l.linea.filter(p=>p.pesoOK===false&&p.indOK!==false&&!p.repro);

  const totalEventos = nokInd.length + reproInd.length + nokFin.length + reproFin.length + nokPeso.length;
  if(!totalEventos){
    mostrarToast('✔ Sin desvíos detectados en este lote');
    return;
  }

  const ind=cfg.inductoras.find(i=>i.id===l.cab.indId)||{nombre:''};
  const filas=[];

  // ── NC ABIERTAS: inducción NOK sin reprocesar ──
  nokInd.forEach(p=>{
    const pn=p.nPal||String(l.linea.indexOf(p)+1);
    const indObj=cfg.inductoras.find(i=>i.id===l.cab.indId)||{};
    const v=parseFloat(p.indVal);
    const tipo=(!isNaN(v)&&v<indObj.tolMin)?'Inducción débil':'Pérdida por inducción';
    filas.push({
      fecha:l.cab.fecha, lote:l.cab.lote, cliente:l.cab.cliente||'',
      prod:l.cab.prod, tipo, sev:'',
      detec:'CONTROL LÍNEA',
      desc:`Pallet ${pn} — Inducción NOK · ${ind.nombre} · valor: ${p.indVal||'—'}${p.obs?' · '+p.obs:''}`,
      litNC:'', litTot:l.final.ltsAprobado||'',
      ac:`Reproceso pallet ${pn}`,
      plazo:'', est:'Pendiente',
      cierre:'', pallets:'1', resp:'', eficacia:'Pendiente',
      _tipo:'abierta'
    });
  });

  // ── CORRECCIONES EN LÍNEA: NOK + REPRO → Finalizado mismo día ──
  reproInd.forEach(p=>{
    const pn=p.nPal||String(l.linea.indexOf(p)+1);
    const indObj=cfg.inductoras.find(i=>i.id===l.cab.indId)||{};
    const v=parseFloat(p.indVal);
    const tipo=(!isNaN(v)&&v<indObj.tolMin)?'Inducción débil':'Pérdida por inducción';
    filas.push({
      fecha:l.cab.fecha, lote:l.cab.lote, cliente:l.cab.cliente||'',
      prod:l.cab.prod, tipo, sev:'Leve',
      detec:'CONTROL LÍNEA',
      desc:`Pallet ${pn} — Inducción NOK · ${ind.nombre} · valor: ${p.indVal||'—'} · CORREGIDO EN LÍNEA${p.obs?' · '+p.obs:''}`,
      litNC:'', litTot:l.final.ltsAprobado||'',
      ac:`Reproceso en línea — pallet ${pn}`,
      plazo:l.cab.fecha,
      est:'Finalizado',
      cierre:l.cab.fecha,  // cerrado el mismo día
      pallets:'1', resp:'', eficacia:'Eficaz',
      _tipo:'correccion'
    });
  });

  // ── NC ABIERTAS: Peso fuera de especificación ──
  nokPeso.forEach(p=>{
    const pn=p.nPal||String(l.linea.indexOf(p)+1);
    const pMin=parseFloat(l.cab.pesoMin),pMax=parseFloat(l.cab.pesoMax);
    const picosNOK=['p1','p2','p3','p4'].filter(pk=>{
      const val=parseFloat(p[pk]);return !isNaN(val)&&(val<pMin||val>pMax);
    });
    const detallePicos=picosNOK.map(pk=>`Pico${pk[1]}:${p[pk]}kg`).join(', ');
    filas.push({
      fecha:l.cab.fecha, lote:l.cab.lote, cliente:l.cab.cliente||'',
      prod:l.cab.prod, tipo:'Peso fuera de especificación', sev:'',
      detec:'CONTROL LÍNEA',
      desc:`Pallet ${pn} — Peso NOK · ${detallePicos} · Rango: ${l.cab.pesoMin}–${l.cab.pesoMax} kg${p.obs?' · '+p.obs:''}`,
      litNC:'', litTot:l.final.ltsAprobado||'',
      ac:`Reproceso pallet ${pn}`,
      plazo:'', est:'Pendiente',
      cierre:'', pallets:'1', resp:'', eficacia:'Pendiente',
      _tipo:'abierta'
    });
  });

  // ── NC ABIERTAS: Control Final NOK ──
  nokFin.forEach(p=>{
    const idx=l.final.pallets.indexOf(p)+1;
    const d=[];
    if(p.idOK===false)d.push('ID NOK');
    if(p.qrOK===false)d.push('QR NOK');
    if(p.paletOK===false)d.push('Estado pallet NOK');
    if(p.indCFOK===false)d.push('Inducción CF NOK');
    const indObj=cfg.inductoras.find(i=>i.id===l.cab.indId)||{};
    const vCF=parseFloat(p.indCFVal);
    const tipoCF=p.indCFOK===false?((!isNaN(vCF)&&vCF<indObj.tolMin)?'Inducción débil':'Pérdida por inducción'):null;
    const tipoFinal = tipoCF || 'Mal estado del packaging';
    const sevFinal  = tipoCF ? '' : 'Leve';
    filas.push({
      fecha:l.cab.fecha, lote:l.cab.lote, cliente:l.cab.cliente||'',
      prod:l.cab.prod, tipo:tipoFinal, sev:sevFinal,
      detec:'CONTROL FINAL',
      desc:`Pallet CF${idx} — ${d.join(', ')}${p.indCFVal?' · valor: '+p.indCFVal:''}${p.obs?' · '+p.obs:''}`,
      litNC:'', litTot:l.final.ltsAprobado||'',
      ac:`Corrección pallet CF${idx}`,
      plazo:'', est:'Pendiente',
      cierre:'', pallets:'1', resp:'', eficacia:'Pendiente',
      _tipo:'abierta'
    });
  });

  // ── CORRECCIONES EN CONTROL FINAL: NOK + REPRO → Finalizado mismo día ──
  reproFin.forEach(p=>{
    const idx=l.final.pallets.indexOf(p)+1;
    const d=[];
    if(p.idOK===false)d.push('ID NOK');
    if(p.qrOK===false)d.push('QR NOK');
    if(p.paletOK===false)d.push('Estado pallet NOK');
    if(p.indCFOK===false)d.push('Inducción CF NOK');
    const indObj=cfg.inductoras.find(i=>i.id===l.cab.indId)||{};
    const vCF=parseFloat(p.indCFVal);
    const tipoCF=p.indCFOK===false?((!isNaN(vCF)&&vCF<indObj.tolMin)?'Inducción débil':'Pérdida por inducción'):null;
    const tipoFinal = tipoCF || 'Mal estado del packaging';
    filas.push({
      fecha:l.cab.fecha, lote:l.cab.lote, cliente:l.cab.cliente||'',
      prod:l.cab.prod, tipo:tipoFinal, sev:'Leve',
      detec:'CONTROL FINAL',
      desc:`Pallet CF${idx} — ${d.join(', ')}${p.indCFVal?' · valor: '+p.indCFVal:''} · CORREGIDO EN FINAL${p.obs?' · '+p.obs:''}`,
      litNC:'', litTot:l.final.ltsAprobado||'',
      ac:`Corrección en final — pallet CF${idx}`,
      plazo:l.cab.fecha, est:'Finalizado',
      cierre:l.cab.fecha,
      pallets:'1', resp:l.final.controlador||'', eficacia:'Eficaz',
      _tipo:'correccion'
    });
  });

  // Guardar en localStorage como canal hacia el RNC
  const payload={
    origen:`REG-01 · ${l.cab.lote} · ${l.cab.prod}`,
    timestamp: new Date().toISOString(),
    filas,
    resumen:{
      abiertas: filas.filter(f=>f._tipo==='abierta').length,
      correccionesLinea: filas.filter(f=>f._tipo==='correccion').length,
    },
    totalFilas: filas.length
  };
  try{ localStorage.setItem('reg01_nc_pendientes', JSON.stringify(payload)); }
  catch(e){ mostrarToast('⚠ No se pudo guardar en localStorage'); return; }

  const nombreRNC = localStorage.getItem('reg01_rnc_nombre')||'registro_nc.html';
  const ventana=window.open(nombreRNC,'_blank');
  const msg=[];
  if(payload.resumen.abiertas)    msg.push(`${payload.resumen.abiertas} NC abierta(s)`);
  if(payload.resumen.correccionesLinea) msg.push(`${payload.resumen.correccionesLinea} corrección(es) en línea`);
  if(ventana){
    mostrarToast(`📤 RNC abierto — ${msg.join(' · ')}`);
  } else {
    mostrarToast(`✔ ${msg.join(' · ')} guardadas. Abrí el RNC manualmente.`);
  }
}

// Verifica qué pallets del Control Final están incompletos
// Retorna array de números de pallet con campos faltantes
function palletsFaltantes(l){
  const faltantes=[];
  l.final.pallets.forEach((p,i)=>{
    const campos=[];
    if(p.idOK===null||p.idOK===undefined)    campos.push('ID');
    if(p.qrOK===null||p.qrOK===undefined)    campos.push('Trazab./QR');
    if(p.paletOK===null||p.paletOK===undefined) campos.push('Estado pallet');
    if(p.indCFOK===null||p.indCFOK===undefined) campos.push('Ind.CF');
    if(campos.length) faltantes.push({num:i+1, pallet:p.nPal||String(i+1), campos});
  });
  return faltantes;
}

function cerrar(){
  const l=getLote();if(!l)return;

  // ── Verificar completitud del Control Final ──
  const faltantes=palletsFaltantes(l);
  if(faltantes.length>0){
    // Construir mensaje descriptivo
    const detalle=faltantes.slice(0,5).map(f=>
      `  • Pallet ${f.pallet}: falta ${f.campos.join(', ')}`
    ).join('\n');
    const resto=faltantes.length>5?`\n  ... y ${faltantes.length-5} más`:'';
    const msg=
      `⛔ No se puede cerrar el lote\n\n`+
      `${faltantes.length} pallet(s) sin completar en Control Final:\n`+
      detalle+resto+
      `\n\n¿Sos la coordinadora y querés forzar el cierre?`;

    if(!confirm(msg)) return;

    // ── Override con clave de coordinadora ──
    const claveIngresada=prompt(
      '🔑 Ingresá la clave de coordinadora para forzar el cierre:',''
    );
    if(claveIngresada===null) return; // canceló
    if(claveIngresada.trim() !== String(cfg.claveCoord||'1234')){
      alert('❌ Clave incorrecta. No se puede cerrar el lote.');
      return;
    }
    // Override autorizado — registrar en el lote
    l.cierreOverride={
      fecha: new Date().toISOString(),
      palletsFaltantes: faltantes.length,
      motivo: 'Override coordinadora'
    };
    mostrarToast('🔑 Cierre forzado autorizado por coordinadora');
  }

  // ── Verificar dictamen ──
  if(!l.final.dictamen&&!confirm('Sin dictamen ISIS. ¿Cerrar igual?')) return;

  l.estado=l.final.dictamen==='APROBADO'?'aprobado':
           l.final.dictamen==='RETENIDO'?'retenido':'cerrado';
  guardarLotes();renderTabs();renderLote();
  mostrarToast(`✔ Lote ${l.cab.lote} → ${l.estado.toUpperCase()}`);
}


// ════════════════════════════════════════════════════════
// BLOQUE JS 10 — ARCHIVADO DE LOTES
// archivarLote(): exporta JSON del lote completo +
//   abre diálogo de impresión para guardar PDF.
// Nombre del archivo según estado:
//   ACTIVO con CF pendientes → _Npal_CF_PENDIENTES.json
//   ACTIVO con CF completo   → _EN_PROCESO.json
//   CERRADO                  → _APROBADO/_RETENIDO.json
// printStyle: CSS de impresión (tema claro, A4 landscape).
// ════════════════════════════════════════════════════════
// ══ ARCHIVAR LOTE ══
// Exporta JSON (respaldo técnico) + abre diálogo de impresión para PDF
function archivarLote(){
  const l=getLote();if(!l)return;
  if(l.estado==='activo'){
    if(!confirm('Este lote todavía está activo. ¿Archivar igual?'))return;
  }

  // 1. Exportar JSON con todos los datos del lote
  // Nombre inteligente según estado:
  // activo → _EN_PROCESO  (va a carpeta LOTES_ACTIVOS)
  // cerrado/aprobado/retenido → _APROBADO/_RETENIDO  (va a LOTES_CERRADOS)
  const estadoNombre = l.estado==='activo'?'EN_PROCESO':l.estado.toUpperCase();
  const faltantes=palletsFaltantes(l);
  const sufijo=l.estado==='activo'&&faltantes.length>0
    ? `EN_PROCESO_${faltantes.length}CF_PENDIENTES`
    : estadoNombre;
  const nombreArchivo=`${l.cab.lote}_${l.cab.prod.replace(/[^a-zA-Z0-9]/g,'_')}_${sufijo}`;
  const json=JSON.stringify({
    version:'REG01-v3',
    exportado:new Date().toISOString(),
    lote:l
  }, null, 2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=nombreArchivo+'.json'; a.click();
  URL.revokeObjectURL(url);

  // 2. Abrir diálogo de impresión para guardar PDF
  setTimeout(()=>{
    // Rellenar encabezado de impresión con codificación actual
    const l=getLote();
    const meta=document.getElementById('print-meta');
    if(meta){
      const rows=[
        ['Código', cfg.docCodigo||'SGC-REG01-APP'],
        ['Versión', cfg.docVersion||'00'],
        ['Lote', l?.cab?.lote||''],
        ['Fecha', l?.cab?.fecha||''],
        ['Elab.', cfg.docElab||'Maximiliano Roca'],
        ['Aprob.', cfg.docAprob||'Evelin Alcaraz'],
      ];
      meta.innerHTML=rows.map(([k,v])=>`
        <div style="display:flex;border-bottom:1px solid #ccc">
          <span style="width:58px;padding:3px 5px;background:#f0f0f0;font-weight:700;border-right:1px solid #ccc">${k}</span>
          <span style="padding:3px 5px;flex:1">${v}</span>
        </div>`).join('');
    }
    mostrarToast('📄 Guardá como PDF en tu carpeta de lotes');
    window.print();
  }, 400);
}

// ════════════════════════════════════════════════════════
// BLOQUE JS 11 — INICIALIZACIÓN Y EVENTOS GLOBALES
// ════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════
// TECLADO VIRTUAL — SOLUCIÓN DEFINITIVA ANDROID
//
// PROBLEMA: con position:fixed en #app, cuando el teclado
// virtual sube en Android, el campo activo puede quedar
// debajo del teclado y no ser visible.
//
// SOLUCIÓN EN DOS CAPAS:
// Capa 1 — visualViewport API:
//   Detecta el cambio de altura visible y ajusta el #app
//   al espacio real encima del teclado.
//   visualViewport.height = altura visible (sin teclado)
//   visualViewport.offsetTop = scroll del viewport visual
//
// Capa 2 — focusin event:
//   Cuando un campo recibe foco, hace scroll hacia él.
//   300ms de delay = tiempo que tarda el teclado en subir.
//
// NOTA: en Chrome Android 108+ el browser maneja esto
// automáticamente con el 'virtual-keyboard' CSS API.
// Este código es el fallback para versiones anteriores.
// ═══════════════════════════════════════════════════════════
(function(){
  const app = document.getElementById('app');

  // Capa 1: visualViewport
  if(window.visualViewport){
    function _ajustarViewport(){
      const vvp = window.visualViewport;
      // Fijar el app al área visual disponible (encima del teclado)
      app.style.height = vvp.height + 'px';
      app.style.top    = vvp.offsetTop + 'px';
      // Scroll al campo activo
      const focused = document.activeElement;
      if(focused && focused !== document.body){
        setTimeout(() => focused.scrollIntoView({block:'center', behavior:'smooth'}), 80);
      }
    }
    window.visualViewport.addEventListener('resize', _ajustarViewport);
    window.visualViewport.addEventListener('scroll', _ajustarViewport);
  }

  // Capa 2: focusin — scroll al campo al recibir foco
  document.addEventListener('focusin', function(e){
    const el = e.target;
    if(!el || el === document.body) return;
    if(el.tagName==='INPUT' || el.tagName==='TEXTAREA' || el.tagName==='SELECT'){
      // 300ms = animación típica del teclado en Android
      setTimeout(() => el.scrollIntoView({block:'center', behavior:'smooth'}), 300);
    }
  });
})()

// ══ REDIBUJAR SOLO AL ROTAR ══
// Comparar orientación antes/después para no redibujar por teclado
let _prevW = window.innerWidth, _prevH = window.innerHeight;
window.addEventListener('resize', ()=>{
  const w=window.innerWidth, h=window.innerHeight;
  // Rotación real: cambia cuál dimensión es mayor
  const rotó = (w>h) !== (_prevW>_prevH);
  _prevW=w; _prevH=h;
  if(rotó && loteActivo) renderLote();
});
window.addEventListener('orientationchange',()=>{
  setTimeout(()=>{ if(loteActivo) renderLote(); _prevW=window.innerWidth; _prevH=window.innerHeight; },300);
});

});
